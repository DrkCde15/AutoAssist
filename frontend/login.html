<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • AutoAssist</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: linear-gradient(180deg, #0b1a3a, #0a1430);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 18px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h1 {
        color: #fff;
        text-align: center;
        margin-bottom: 8px;
      }

      p {
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
        margin-bottom: 30px;
      }

      label {
        color: #fff;
        font-size: 14px;
        margin-bottom: 6px;
        display: block;
      }

      input {
        width: 100%;
        padding: 14px;
        margin-bottom: 18px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        outline: none;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #2563eb;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .links {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
      }

      .links a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      .alert {
        display: none;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 14px;
      }

      .error {
        background: rgba(239, 68, 68, 0.2);
        color: #fecaca;
      }

      .password-wrapper {
        position: relative;
        margin-bottom: 18px;
        width: 100%;
      }

      .password-wrapper input {
        margin-bottom: 0;
        padding-right: 46px;
      }

      .password-toggle {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.4);
        cursor: pointer;
        transition: color 0.3s;
        font-size: 16px;
      }

      .password-toggle:hover {
        color: #fff;
      }

      @media (max-width: 480px) {
        .container {
          padding: 30px 20px;
          border-radius: 12px;
        }

        h1 {
          font-size: 28px;
        }

        p {
          font-size: 14px;
        }

        input {
          padding: 12px;
        }

        button {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>NOG</h1>
      <p>Login</p>

      <div id="error" class="alert error"></div>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required placeholder="Email" />

        <label>Senha</label>
        <div class="password-wrapper">
          <input type="password" id="password" required placeholder="Senha" />
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
        </div>

        <button type="submit">Entrar</button>
      </form>

      <!-- NOVO: Form de 2FA -->
      <form id="twoFactorForm" style="display: none;">
        <p style="margin-bottom: 20px;">Segurança: Digite sua senha secundária para continuar.</p>
        <label>Senha Secundária</label>
        <div class="password-wrapper">
          <input type="password" id="twoFactorCode" placeholder="Sua senha de 2FA" />
          <i class="fas fa-eye password-toggle" id="toggle2FA"></i>
        </div>
        <button type="submit">Confirmar e Entrar</button>
        <button type="button" id="backBtn" style="background: transparent; border: 1px solid #2563eb; margin-top: 10px; color: #2563eb;">Voltar</button>
      </form>

      <div class="links" id="registerLinks">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a><br><br>
        <a href="esqueci-senha.html">Esqueci minha senha</a>
      </div>
    </div>

    <script src="./static/js/config.js"></script>
    <script src="./static/js/auth.js"></script>
    <script>
      // Redireciona se ja estiver logado
      if (Auth.isAuthenticated()) {
          window.location.href = "index.html";
      }

      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("loginForm");
        const twoFactorForm = document.getElementById("twoFactorForm");
        const errorBox = document.getElementById("error");
        const registerLinks = document.getElementById("registerLinks");
        
        let pendingToken = null;

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          errorBox.style.display = "none";

          const email = document.getElementById("email").value.trim().toLowerCase();
          const password = document.getElementById("password").value;

          try {
            const data = await Auth.login(email, password);
            
            if (data.two_factor_required) {
              pendingToken = data.pending_token;
              form.style.display = "none";
              twoFactorForm.style.display = "block";
              registerLinks.style.display = "none";
              document.querySelector("p").innerText = "Verificação de Segurança";
            } else {
              window.location.href = "index.html";
            }
          } catch (err) {
            errorBox.textContent = err.message;
            errorBox.style.display = "block";
          }
        });

        twoFactorForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          errorBox.style.display = "none";
          
          const code = document.getElementById("twoFactorCode").value;
          if (!code) return;

          try {
            await Auth.verify2FA(pendingToken, code);
            window.location.href = "index.html";
          } catch (err) {
            errorBox.textContent = err.message;
            errorBox.style.display = "block";
          }
        });

        document.getElementById("backBtn").addEventListener("click", () => {
            twoFactorForm.style.display = "none";
            form.style.display = "block";
            registerLinks.style.display = "block";
            document.querySelector("p").innerText = "Login";
            errorBox.style.display = "none";
        });

        const toggleVisibility = (toggleId, inputId) => {
          const toggleBtn = document.getElementById(toggleId);
          const inputField = document.getElementById(inputId);
          if (toggleBtn && inputField) {
            toggleBtn.addEventListener("click", function() {
              if (inputField.type === "password") {
                inputField.type = "text";
                this.classList.remove("fa-eye");
                this.classList.add("fa-eye-slash");
              } else {
                inputField.type = "password";
                this.classList.remove("fa-eye-slash");
                this.classList.add("fa-eye");
              }
            });
          }
        };

        toggleVisibility("togglePassword", "password");
        toggleVisibility("toggle2FA", "twoFactorCode");
      });
    </script>
  </body>
</html>
