<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento confirmado | AutoAssist</title>
  <link rel="icon" type="image/png" href="icon-dark-32x32.png">
  <style>
:root {
      color-scheme: dark;
      --bg: #101820;
      --panel: #172330;
      --panel-strong: #223140;
      --line: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #a9bdd1;
      --ok: #19c37d;
      --warn: #f6b44b;
      --danger: #ef5b5b;
      --brand: #0f8f7d;
      --brand-strong: #0a7a69;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(100%, 520px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      padding: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }
    .brand span {
      font-size: 1.05rem;
      font-weight: 800;
    }
    .status-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      background: rgba(25, 195, 125, 0.14);
      border: 1px solid rgba(25, 195, 125, 0.32);
      color: var(--ok);
    }
    .status-icon svg {
      width: 28px;
      height: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem;
    }
    .status.ok {
      color: #bff4db;
      border-color: rgba(25, 195, 125, 0.34);
    }
    .status.warn {
      color: #ffe0ad;
      border-color: rgba(246, 180, 75, 0.34);
    }
    .status.error {
      color: #ffc7c7;
      border-color: rgba(239, 91, 91, 0.34);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    button,
    a.button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--brand);
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
      cursor: pointer;
      transition: filter 0.18s ease, transform 0.18s ease;
    }
    button:hover,
    a.button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    a.button.secondary,
    button.secondary {
      background: #314255;
      color: #e6eef7;
    }
    button:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.28);
      border-top-color: #ffffff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    @media (max-width: 520px) {
      main {
        padding: 22px;
      }
      .actions {
        flex-direction: column;
      }
      button,
      a.button {
        width: 100%;
      }
    }
</style>
  <link rel="stylesheet" href="static/css/shared.css">
</head>
<body>
  <main>
    <div class="brand">
      <img src="logo.png" alt="AutoAssist">
      <span>AutoAssist</span>
    </div>

    <div class="status-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Pagamento recebido</h1>
    <p>Estamos atualizando seu acesso Premium. Isso normalmente leva poucos segundos.</p>

    <div id="payment-status" class="status">
      <span class="spinner" aria-hidden="true"></span>
      Verificando sua assinatura...
    </div>

    <div class="actions">
      <a class="button" id="primary-action" href="index.html">Ir para o início</a>
      <button class="secondary" id="retry-button" type="button">Atualizar status</button>
    </div>
  </main>

  <script src="static/js/config.js"></script>
  <script src="static/js/auth.js"></script>
  <script>
    const statusBox = document.getElementById("payment-status");
    const retryButton = document.getElementById("retry-button");
    const primaryAction = document.getElementById("primary-action");

    function setStatus(message, type = "") {
      statusBox.className = `status ${type}`.trim();
      statusBox.textContent = message;
    }

    function setSuccess() {
      setStatus("Premium liberado. Bem-vindo ao AutoAssist Premium.", "ok");
      primaryAction.textContent = "Acessar painel";
      primaryAction.href = "dashboard.html";
      retryButton.textContent = "Ir para o chat";
      retryButton.disabled = false;
      retryButton.onclick = () => {
        window.location.href = "chat.html";
      };
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function checkPremiumStatus({ attempts = 8 } = {}) {
      retryButton.disabled = true;
      statusBox.innerHTML = '<span class="spinner" aria-hidden="true"></span> Verificando sua assinatura...';

      if (!Auth.isAuthenticated()) {
        setStatus("Entre com a mesma conta usada na compra para finalizar a liberação.", "warn");
        primaryAction.textContent = "Entrar na conta";
        primaryAction.href = "login.html";
        retryButton.disabled = false;
        retryButton.textContent = "Tentar novamente";
        return;
      }

      for (let attempt = 1; attempt <= attempts; attempt += 1) {
        const user = await Auth.syncUser({ force: true, redirectOnInvalid: false });
        if (user && user.is_premium) {
          setSuccess();
          return;
        }

        try {
          const res = await Auth.authenticatedFetch("/api/pay/confirm", { method: "POST" });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.is_premium) {
            await Auth.syncUser({ force: true, redirectOnInvalid: false });
            setSuccess();
            return;
          }
        } catch {
          // A sincronizacao acima ja cobre o estado final; seguimos tentando.
        }

        if (attempt < attempts) {
          setStatus("Pagamento recebido. Aguardando confirmacao...", "warn");
          await wait(3000);
        }
      }

      setStatus("Pagamento recebido, mas a liberacao ainda nao apareceu na sua conta. Atualize em alguns segundos.", "warn");
      retryButton.disabled = false;
      retryButton.textContent = "Atualizar status";
      retryButton.onclick = () => checkPremiumStatus({ attempts: 5 });
    }

    retryButton.addEventListener("click", () => checkPremiumStatus({ attempts: 5 }));
    checkPremiumStatus();
  </script>
</body>
</html>
