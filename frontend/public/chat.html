<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>AutoAssist • Chat</title>
    <link rel="icon" type="image/png" href="static/logo2.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>

    <style>
      :root {
        --bg-primary: #0a0a0c;
        --bg-secondary: #101013;
        --bg-card: #15151a;
        --bg-card-hover: #1a1a20;
        --bg-input: #1f1f25;
        --bg-elevated: #1c1c22;
        --border-color: #232329;
        --border-subtle: #1d1d23;
        --border-hover: #34343d;
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #6b6b75;
        --accent: #4f8cff;
        --accent-hover: #3b7afe;
        --accent-strong: #2563eb;
        --accent-soft: rgba(79, 140, 255, 0.08);
        --accent-ring: rgba(79, 140, 255, 0.18);
        --danger: #f25555;
        --success: #22c55e;
        --radius-sm: 8px;
        --radius: 10px;
        --radius-lg: 14px;
        --radius-xl: 18px;
        --transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.25);
        --shadow-lg: 0 12px 32px rgba(0,0,0,0.35);
        --shadow-glow: 0 0 0 1px var(--accent-ring), 0 8px 24px rgba(37, 99, 235, 0.18);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      *::selection {
        background: var(--accent-ring);
        color: var(--text-primary);
      }

      html, body { height: 100%; }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 600px at 80% -10%, rgba(79,140,255,0.06), transparent 60%),
          radial-gradient(900px 500px at -10% 110%, rgba(79,140,255,0.04), transparent 60%),
          var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "cv02","cv03","cv04","cv11";
        letter-spacing: -0.005em;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #2a2a32;
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a45; background-clip: padding-box; }

      /* Header */
      header {
        padding: 12px 28px;
        background: rgba(16, 16, 19, 0.85);
        backdrop-filter: saturate(140%) blur(20px);
        -webkit-backdrop-filter: saturate(140%) blur(20px);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        position: relative;
      }

      .header-left {
        display: flex;
        align-items: center;
      }

      .logo-link {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .logo-icon img {
        height: 64px !important;
        width: auto;
        display: block;
      }

      .logo-text {
        font-size: 19px;
        font-weight: 800;
        color: var(--text-primary);
      }

      .header-nav {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        background: transparent;
        border: none;
        border-radius: 0;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        line-height: 1;
        white-space: nowrap;
      }

      .nav-btn:hover {
        color: var(--text-primary);
        transform: translateY(-1px);
      }

      .nav-btn-accent {
        color: var(--accent);
      }

      .nav-btn-danger {
        color: #fca5a5;
      }

      .header-right {
        display: flex;
        gap: 24px;
        align-items: center;
      }

      /* Messages */
      #messages {
        flex: 1;
        padding: 32px 24px 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scroll-behavior: smooth;
        max-width: 920px;
        width: 100%;
        margin: 0 auto;
      }

      .msg-user,
      .msg-bot {
        max-width: 78%;
        padding: 14px 18px;
        border-radius: var(--radius-lg);
        font-size: 14.5px;
        line-height: 1.65;
        animation: slideIn 0.28s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
        word-wrap: break-word;
        position: relative;
      }

      .msg-user {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #ffffff;
        border-bottom-right-radius: 6px;
        box-shadow: 0 6px 18px rgba(37, 99, 235, 0.22);
        font-weight: 500;
      }

      .msg-bot {
        align-self: flex-start;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-bottom-left-radius: 6px;
        color: var(--text-primary);
        box-shadow: var(--shadow-sm);
      }

      .msg-bot strong {
        color: var(--accent);
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .msg-bot ul,
      .msg-bot ol {
        margin: 10px 0;
        padding-left: 22px;
      }

      .msg-bot li {
        margin-bottom: 6px;
        color: var(--text-primary);
      }

      .msg-bot li::marker { color: var(--text-muted); }

      .msg-bot blockquote {
        border-left: 3px solid var(--accent);
        background: var(--accent-soft);
        padding: 12px 16px;
        margin: 14px 0;
        border-radius: 0 10px 10px 0;
        color: var(--text-secondary);
        font-style: normal;
      }

      .msg-bot h1,
      .msg-bot h2,
      .msg-bot h3 {
        margin: 18px 0 10px 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.01em;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .msg-bot h1:first-child,
      .msg-bot h2:first-child,
      .msg-bot h3:first-child { margin-top: 4px; }

      .msg-bot p {
        margin-bottom: 10px;
        color: var(--text-primary);
      }

      .msg-bot p:last-child { margin-bottom: 0; }

      .msg-bot a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(79,140,255,0.3);
        transition: var(--transition);
      }
      .msg-bot a:hover { border-bottom-color: var(--accent); }

      .msg-bot code {
        background: var(--bg-input);
        padding: 2px 7px;
        border-radius: 5px;
        font-size: 12.5px;
        font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
        color: #e2e8f0;
        border: 1px solid var(--border-subtle);
      }

      .msg-bot pre {
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        padding: 14px 16px;
        border-radius: 10px;
        overflow-x: auto;
        margin: 12px 0;
        font-size: 13px;
      }
      .msg-bot pre code {
        background: transparent;
        border: none;
        padding: 0;
      }

      /* Typing Indicator */
      .typing-indicator {
        display: flex;
        gap: 5px;
        padding: 6px 0;
        align-items: center;
      }

      .typing-indicator span {
        width: 7px;
        height: 7px;
        background: var(--text-muted);
        border-radius: 50%;
        animation: bounce 1.3s infinite ease-in-out;
      }

      .typing-indicator span:nth-child(1) { animation-delay: 0s; }
      .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Videos */
      .videos-container {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-top: 16px;
        margin-top: 16px;
        border-top: 1px solid var(--border-subtle);
        scrollbar-width: thin;
      }

      .video-card {
        min-width: 210px;
        max-width: 210px;
        background: var(--bg-elevated);
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border-subtle);
        transition: var(--transition);
      }

      .video-card:hover {
        border-color: var(--border-hover);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .video-thumbnail {
        width: 100%;
        height: 118px;
        object-fit: cover;
        display: block;
      }

      .video-info { padding: 12px 14px; }

      .video-title {
        font-size: 13px;
        color: var(--text-primary);
        line-height: 1.45;
        font-weight: 500;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Footer */
      footer {
        padding: 14px 24px 22px;
        background: linear-gradient(180deg, transparent, var(--bg-primary) 30%);
        border-top: 1px solid transparent;
      }

      .chat-input-wrapper {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-xl);
        display: flex;
        flex-direction: column;
        transition: var(--transition);
        max-width: 920px;
        margin: 0 auto;
        box-shadow: var(--shadow-md);
      }

      .chat-input-wrapper:hover { border-color: var(--border-hover); }

      .chat-input-wrapper:focus-within {
        border-color: var(--accent);
        box-shadow: var(--shadow-glow);
      }

      .image-preview-container {
        display: none;
        gap: 10px;
        padding: 14px 14px 0;
        flex-wrap: wrap;
      }

      .image-preview-item {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border-subtle);
      }

      .image-preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .image-preview-actions {
        position: absolute;
        top: -6px;
        right: -6px;
      }

      .image-preview-btn {
        width: 22px;
        height: 22px;
        background: var(--bg-elevated);
        color: var(--text-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        cursor: pointer;
        border: 1px solid var(--border-color);
        transition: var(--transition);
        box-shadow: var(--shadow-sm);
      }

      .image-preview-btn:hover {
        background: var(--danger);
        border-color: var(--danger);
        color: white;
      }

      .chat-input-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
      }

      input#messageInput {
        flex: 1;
        padding: 12px 10px;
        background: transparent;
        border: none;
        color: var(--text-primary);
        outline: none;
        font-size: 14.5px;
        font-family: inherit;
        font-weight: 400;
      }

      input#messageInput::placeholder {
        color: var(--text-muted);
        font-weight: 400;
      }

      .btn-icon {
        width: 38px;
        height: 38px;
        background: transparent;
        border: none;
        border-radius: 10px;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: var(--transition);
        flex-shrink: 0;
      }

      .btn-icon:hover {
        background: var(--bg-input);
        color: var(--text-primary);
      }

      .send-btn {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong)) !important;
        color: white !important;
        border-radius: 10px;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.28);
      }

      .send-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.38);
        opacity: 1;
      }

      .send-btn:active { transform: translateY(0); }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        header {
          padding: 12px 16px;
          gap: 12px;
        }

        .header-left { gap: 12px; flex: 1; min-width: 0; }
        .header-nav { padding: 3px; }
        .nav-btn span { display: none; }
        .nav-btn { padding: 8px 10px; }
        .logo-icon img { height: 48px !important; }
        .logo-text { font-size: 15px; }

        .msg-user, .msg-bot {
          max-width: 92%;
          padding: 12px 14px;
          font-size: 14px;
        }

        #messages { padding: 20px 14px 16px; gap: 12px; }
        footer { padding: 10px 14px 16px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <a href="index.html" class="logo-link">
          <div class="logo-icon">
            <img src="logo.png" alt="AutoAssist IA" style="height:72px;width:auto;">
          </div>
          <span class="logo-text">Auto<span>Assist</span></span>
        </a>
      </div>

      <div class="header-right">
        <nav class="header-nav">
          <a href="dashboard.html" id="navDashboard" class="nav-btn" style="display: none;">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
          </a>
          <a href="chat.html" class="nav-btn nav-btn-accent">
            <i class="fas fa-comments"></i>
            <span>Chat</span>
          </a>
          <a href="maintenance_history.html" class="nav-btn">
            <i class="fas fa-history"></i>
            <span>Histórico</span>
          </a>
          <a href="videos.html" id="btnMyVideos" class="nav-btn" style="display: none;">
            <i class="fas fa-video"></i>
            <span>Vídeos</span>
          </a>
          <a href="perfil.html" class="nav-btn">
            <i class="fas fa-user-circle"></i>
            <span>Perfil</span>
          </a>
          <button id="logout" class="nav-btn nav-btn-danger">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sair</span>
          </button>
        </nav>
        <button id="btnReport" class="nav-btn" title="Gerar PDF da última análise">
          <i class="fas fa-file-pdf"></i>
        </button>
      </div>
    </header>

    <div id="messages"></div>

    <footer>
      <input type="file" id="fileInput" style="display: none" accept="image/*" />
      
      <div class="chat-input-wrapper">
        <div id="imagePreviewContainer" class="image-preview-container"></div>
        
        <div class="chat-input-row">
          <button id="attach" class="btn-icon" title="Anexar foto">
            <i class="fas fa-plus"></i>
          </button>
          <input id="messageInput" placeholder="Pergunte sobre seu veículo..." autocomplete="off" />
          <button id="btnVoice" class="btn-icon" style="display: none" title="Usar voz">
            <i class="fas fa-microphone"></i>
          </button>
          <button id="send" class="btn-icon send-btn" title="Enviar">
            <i class="fas fa-arrow-up"></i>
          </button>
        </div>
      </div>
    </footer>

    <script src="./static/js/config.js"></script>
    <script src="./static/js/auth.js"></script>
    <script>
      const messagesDiv = document.getElementById("messages");
      const input = document.getElementById("messageInput");
      const fileInput = document.getElementById("fileInput");
      const attachBtn = document.getElementById("attach");
      const sendBtn = document.getElementById("send");
      const btnMyVideos = document.getElementById("btnMyVideos");
      const btnReport = document.getElementById("btnReport");
      const btnVoice = document.getElementById("btnVoice");

      let lastAnalysisText = "";
      let isVoiceActive = false;

      // Auth check
      if (typeof Auth !== 'undefined' && !Auth.isAuthenticated()) {
        window.location.href = "login.html";
      } else {
        const user = Auth.getUser();
        if (user && user.is_premium) {
          document.getElementById('navDashboard').style.display = 'inline-flex';
          document.getElementById('btnMyVideos').style.display = 'inline-flex';
        }
      }

      // Voice support
      if ("webkitSpeechRecognition" in window) {
        btnVoice.style.display = "flex";
      }

      // Voice handlers
      let mediaRecorder = null;
      let audioChunks = [];
      let isHandsFreeActive = false;
      let silenceTimeout = null;
      let audioContext = null;
      let analyser = null;
      let microphone = null;
      let streamGlobal = null;
      let hasDetectedSoundInSegment = false;

      btnVoice.addEventListener("click", async () => {
        if (!isHandsFreeActive) {
          startHandsFree();
        } else {
          stopHandsFree();
        }
      });

      async function startHandsFree() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          streamGlobal = stream;
          isHandsFreeActive = true;
          btnVoice.style.color = "var(--danger)";
          
          setupSilenceDetection(stream);
          startRecordingSegment();
        } catch (err) {
          console.error("Mic error:", err);
          input.placeholder = "Sem acesso ao microfone.";
        }
      }

      function setupSilenceDetection(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);
        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        const checkSilence = () => {
          if (!isHandsFreeActive) return;
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
          let average = sum / bufferLength;

          if (average > 15) {
            hasDetectedSoundInSegment = true;
            if (silenceTimeout) {
              clearTimeout(silenceTimeout);
              silenceTimeout = null;
            }
          } else if (hasDetectedSoundInSegment) {
            if (!silenceTimeout) {
              silenceTimeout = setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                  mediaRecorder.stop();
                }
              }, 5000);
            }
          }
          requestAnimationFrame(checkSilence);
        };
        checkSilence();
      }

      function startRecordingSegment() {
        if (!isHandsFreeActive) return;
        
        hasDetectedSoundInSegment = false;
        mediaRecorder = new MediaRecorder(streamGlobal);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
          if (hasDetectedSoundInSegment && audioChunks.length > 0) {
            sendVoiceToBackend(audioBlob);
          }
          
          if (isHandsFreeActive) {
            startRecordingSegment();
          }
        };

        mediaRecorder.start();
        input.placeholder = "Ouvindo... Fale agora.";
      }

      function stopHandsFree() {
        isHandsFreeActive = false;
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
        if (streamGlobal) {
          streamGlobal.getTracks().forEach(track => track.stop());
        }
        if (audioContext) {
          audioContext.close();
        }
        if (silenceTimeout) {
          clearTimeout(silenceTimeout);
          silenceTimeout = null;
        }
        btnVoice.style.color = "";
        input.placeholder = "Pergunte sobre seu veículo...";
      }

      async function sendVoiceToBackend(blob) {
        const formData = new FormData();
        formData.append("audio", blob, "voice.webm");

        addMessage("Processando voz...", "msg-user");
        const typingDiv = addMessage(
          '<div class="typing-indicator"><span></span><span></span><span></span></div>',
          "msg-bot",
          true
        );

        try {
          const res = await Auth.authenticatedFetch("/api/voice", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();
          if (data.error) {
            typingDiv.innerHTML = `<strong>AutoAssist:</strong><br>${data.error}`;
          } else {
            const userMsgs = document.querySelectorAll(".msg-user");
            userMsgs[userMsgs.length - 1].textContent = `Você: ${data.text}`;
            
            const cleanHtml = DOMPurify.sanitize(marked.parse(data.response));
            typingDiv.innerHTML = `<strong>AutoAssist:</strong><br>${cleanHtml}`;
            appendVideosToDiv(typingDiv, data.videos);
            lastAnalysisText = data.response;
          }
        } catch (err) {
          typingDiv.innerHTML = "<strong>AutoAssist:</strong><br>Erro ao processar voz.";
        }
        scrollToBottom();
      }

      // Chat Logic
      const scrollToBottom = () => {
        setTimeout(() => {
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 100);
      };

      function appendVideosToDiv(div, videos) {
        if (videos && videos.length > 0) {
          const vContainer = document.createElement("div");
          vContainer.className = "videos-container";
          
          videos.forEach(v => {
            const vCard = document.createElement("div");
            vCard.className = "video-card";
            const safeTitle = (v.titulo || "").replace(/'/g, "\\'").replace(/"/g, '&quot;');
            
            vCard.innerHTML = `
              ${v.thumbnail ? `<a href="${v.url}" target="_blank"><img src="${v.thumbnail}" class="video-thumbnail" alt="Thumbnail"></a>` : ''}
              <div class="video-info">
                <a href="${v.url}" target="_blank" style="text-decoration:none;">
                  <div class="video-title" title="${safeTitle}">${v.titulo}</div>
                </a>
              </div>
            `;
            vContainer.appendChild(vCard);
          });
          div.appendChild(vContainer);
          scrollToBottom();
        }
      }

      function addMessage(text, cls, isHtml = false, videos = []) {
        const div = document.createElement("div");
        div.className = cls;
        div.innerHTML = isHtml ? text : text;
        if (!isHtml) div.textContent = text;
        messagesDiv.appendChild(div);
        
        appendVideosToDiv(div, videos);
        
        scrollToBottom();
        return div;
      }

      const sendMessage = async () => {
        const msg = input.value.trim();
        const file = fileInput.files[0];
        if (!msg && !file) return;

        addMessage(
          `Você: ${msg}${file ? " [Imagem anexada]" : ""}`,
          "msg-user"
        );

        input.value = "";
        fileInput.value = "";
        document.getElementById("imagePreviewContainer").style.display = "none";
        document.getElementById("imagePreviewContainer").innerHTML = "";

        const typingDiv = addMessage(
          '<div class="typing-indicator"><span></span><span></span><span></span></div>',
          "msg-bot",
          true
        );
        typingDiv.id = "typing";

        try {
          let payload = { message: msg, category: "automotivo" };
          if (file) {
            const reader = new FileReader();
            payload.image = await new Promise((r) => {
              reader.onload = () => r(reader.result);
              reader.readAsDataURL(file);
            });
          }

          const res = await Auth.authenticatedFetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          const botResponse = data.response || data.text || "Desculpe, não consegui processar.";
          lastAnalysisText = botResponse;

          const cleanHtml = DOMPurify.sanitize(marked.parse(botResponse));
          typingDiv.innerHTML = `<strong>AutoAssist:</strong><br>${cleanHtml}`;
          appendVideosToDiv(typingDiv, data.videos);
          typingDiv.id = "";

        } catch (err) {
          typingDiv.innerHTML = "<strong>Erro:</strong> Falha na conexão.";
        }
        scrollToBottom();
      };

      // Events
      sendBtn.addEventListener("click", sendMessage);
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
      
      attachBtn.addEventListener("click", () => fileInput.click());
      
      fileInput.addEventListener("change", () => {
        const container = document.getElementById("imagePreviewContainer");
        if (fileInput.files[0]) {
          const file = fileInput.files[0];
          const reader = new FileReader();
          
          reader.onload = function(e) {
            container.innerHTML = `
              <div class="image-preview-item">
                <img src="${e.target.result}" alt="Preview">
                <div class="image-preview-actions">
                  <div class="image-preview-btn" id="removeImageBtn" title="Remover">
                    <i class="fas fa-times"></i>
                  </div>
                </div>
              </div>
            `;
            container.style.display = "flex";
            
            document.getElementById("removeImageBtn").addEventListener("click", () => {
              fileInput.value = "";
              container.style.display = "none";
              container.innerHTML = "";
            });
          }
          
          reader.readAsDataURL(file);
        } else {
          container.style.display = "none";
          container.innerHTML = "";
        }
      });

      document.getElementById("logout").addEventListener("click", () => {
        if (typeof Auth !== 'undefined') Auth.logout();
      });

      // Report
      btnReport.addEventListener("click", async () => {
        if (!lastAnalysisText) return alert("Faça uma análise primeiro.");
        btnReport.disabled = true;
        try {
          const res = await Auth.authenticatedFetch("/api/report", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: lastAnalysisText }),
          });
          const data = await res.json();
          if (data.url && typeof CONFIG !== 'undefined') {
            window.open(`${CONFIG.API_URL}${data.url}`, "_blank");
          }
        } catch (e) {
          alert("Erro ao gerar PDF.");
        }
        btnReport.disabled = false;
      });

      // Load history
      (async () => {
        if (typeof Auth === 'undefined') return;

        // Tenta carregar do cache para resposta instantânea
        const cachedHistory = Auth.Cache.get('autoassist_chat_history_cache');
        if (cachedHistory) {
          renderChatHistory(cachedHistory);
        }

        try {
          const res = await Auth.authenticatedFetch("/api/chat/history");
          if (res.ok) {
            const data = await res.json();
            if (data.chats) {
              Auth.Cache.set('autoassist_chat_history_cache', data.chats);
              renderChatHistory(data.chats);
            }
          }
        } catch (error) {
          console.warn('Erro ao carregar histórico do chat:', error);
        }
      })();

      function renderChatHistory(chats) {
        if (!chats || chats.length === 0) return;
        messagesDiv.innerHTML = "";
        chats.forEach((c) => {
          addMessage(`Você: ${c.mensagem_usuario}`, "msg-user");
          const cleanHtml = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(marked.parse(c.resposta_ia)) : marked.parse(c.resposta_ia);
          addMessage(
            `<strong>AutoAssist:</strong><br>${cleanHtml}`,
            "msg-bot",
            true,
            c.videos
          );
        });
        scrollToBottom();
      }
    </script>
  </body>
</html>
