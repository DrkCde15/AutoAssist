<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>AutoAssist • Chat</title>
    <link rel="icon" type="image/png" href="static/logo2.png?v=20260506">
    <link rel="shortcut icon" type="image/png" href="static/logo2.png?v=20260506">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js" crossorigin="anonymous"></script>

    <style>
      :root {
        --bg-primary: #0a0a0c;
        --bg-secondary: #101013;
        --bg-card: #15151a;
        --bg-card-hover: #1a1a20;
        --bg-input: #1f1f25;
        --bg-elevated: #1c1c22;
        --border-color: #232329;
        --border-subtle: #1d1d23;
        --border-hover: #34343d;
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #6b6b75;
        --accent: #4f8cff;
        --accent-blue: #4f8cff;
        --accent-hover: #3b7afe;
        --accent-strong: #2563eb;
        --accent-soft: rgba(79, 140, 255, 0.08);
        --accent-ring: rgba(79, 140, 255, 0.18);
        --danger: #f25555;
        --success: #22c55e;
        --radius-sm: 8px;
        --radius: 10px;
        --radius-lg: 14px;
        --radius-xl: 18px;
        --transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.25);
        --shadow-lg: 0 12px 32px rgba(0,0,0,0.35);
        --shadow-glow: 0 0 0 1px var(--accent-ring), 0 8px 24px rgba(37, 99, 235, 0.18);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      *::selection {
        background: var(--accent-ring);
        color: var(--text-primary);
      }

      html, body { height: 100%; }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 600px at 80% -10%, rgba(79,140,255,0.06), transparent 60%),
          radial-gradient(900px 500px at -10% 110%, rgba(79,140,255,0.04), transparent 60%),
          var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "cv02","cv03","cv04","cv11";
        letter-spacing: -0.005em;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #2a2a32;
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a45; background-clip: padding-box; }

      /* Header */
      header {
        padding: 12px 28px;
        background: rgba(16, 16, 19, 0.85);
        backdrop-filter: saturate(140%) blur(20px);
        -webkit-backdrop-filter: saturate(140%) blur(20px);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        position: relative;
      }

      .header-left {
        display: flex;
        align-items: center;
      }

      .logo-link {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .logo-icon img {
        height: 84px !important;
        width: auto;
        display: block;
      }

      .logo-text {
        font-size: 19px;
        font-weight: 800;
        color: var(--text-primary);
      }

      .header-nav {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        background: transparent;
        border: none;
        border-radius: 0;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        line-height: 1;
        white-space: nowrap;
      }

      .nav-btn:hover {
        color: var(--text-primary);
        transform: translateY(-1px);
      }

      .nav-btn-accent {
        color: var(--accent);
      }

      .nav-btn-danger {
        color: #fca5a5;
      }

      .header-right {
        display: flex;
        gap: 24px;
        align-items: center;
      }

      .sidebar-toggle {
        display: none;
        width: 38px;
        height: 38px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
        background: var(--bg-card);
        color: var(--text-secondary);
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition);
      }

      .sidebar-toggle:hover {
        color: var(--text-primary);
        border-color: var(--border-hover);
      }

      .chat-shell {
        flex: 1;
        min-height: 0;
        display: flex;
        width: 100%;
      }

      .chat-main {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .chat-sidebar {
        width: 316px;
        flex: 0 0 316px;
        padding: 18px 10px 18px 16px;
        background: #030304;
        border-right: 1px solid var(--border-subtle);
        display: flex;
        flex-direction: column;
        gap: 22px;
        overflow-y: auto;
      }

      .sidebar-actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .sidebar-action {
        width: 100%;
        min-height: 44px;
        padding: 10px 14px;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 12px;
        font: inherit;
        font-size: 15px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: var(--transition);
      }

      .sidebar-action i {
        width: 18px;
        color: var(--text-primary);
        font-size: 16px;
        text-align: center;
      }

      .sidebar-action:hover,
      .sidebar-action.is-primary {
        background: #2b2b2e;
        color: #ffffff;
      }

      .sidebar-search {
        display: none;
        padding: 4px 2px 0;
      }

      .sidebar-search.is-open {
        display: block;
      }

      .sidebar-search input {
        width: 100%;
        height: 40px;
        padding: 0 12px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        background: var(--bg-card);
        color: var(--text-primary);
        font: inherit;
        font-size: 14px;
        outline: none;
      }

      .sidebar-search input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-ring);
      }

      .sidebar-section {
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .sidebar-heading {
        padding: 0 4px;
        color: var(--text-primary);
        font-size: 16px;
        font-weight: 700;
      }

      .chat-history-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .history-chat-row {
        width: 100%;
        min-height: 42px;
        padding: 4px 6px 4px 12px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: transparent;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: var(--transition);
      }

      .history-chat-row:hover,
      .history-chat-row.is-active {
        background: var(--bg-card);
        border-color: var(--border-subtle);
      }

      .history-chat-item {
        min-width: 0;
        flex: 1;
        padding: 6px 0;
        border: none;
        background: transparent;
        color: var(--text-primary);
        font: inherit;
        font-size: 14.5px;
        line-height: 1.35;
        text-align: left;
        cursor: pointer;
      }

      .history-delete-btn {
        width: 30px;
        height: 30px;
        flex: 0 0 30px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 13px;
        transition: var(--transition);
      }

      .history-delete-btn:hover {
        background: rgba(242, 85, 85, 0.12);
        color: var(--danger);
      }

      .history-chat-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-empty {
        padding: 10px 12px;
        color: var(--text-muted);
        font-size: 13.5px;
        line-height: 1.45;
      }

      .sidebar-overlay {
        display: none;
      }

      /* Messages */
      #messages {
        flex: 1;
        padding: 32px 24px 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
        max-width: 920px;
        width: 100%;
        margin: 0 auto;
      }

      .message-row {
        width: 100%;
        display: flex;
        align-items: flex-end;
        gap: 10px;
        animation: slideIn 0.28s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
      }

      .message-row-user {
        justify-content: flex-end;
      }

      .message-row-bot {
        justify-content: flex-start;
      }

      .message-avatar {
        width: 34px;
        height: 34px;
        flex: 0 0 34px;
        border-radius: 50%;
        overflow: hidden;
        background: var(--bg-elevated);
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow-sm);
        margin-bottom: 4px;
      }

      .message-avatar img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .message-stack {
        max-width: 78%;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .message-row-user .message-stack {
        align-items: flex-end;
      }

      .message-row-bot .message-stack {
        align-items: flex-start;
      }

      .message-meta {
        margin: 0 6px;
        color: var(--text-muted);
        font-size: 11.5px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0;
      }

      .message-row-bot .message-meta {
        color: var(--accent);
      }

      .msg-user,
      .msg-bot {
        max-width: 100%;
        padding: 14px 18px;
        border-radius: var(--radius-lg);
        font-size: 14.5px;
        line-height: 1.65;
        word-wrap: break-word;
        position: relative;
        letter-spacing: 0;
      }

      .msg-user {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #ffffff;
        border-bottom-right-radius: 6px;
        box-shadow: 0 6px 18px rgba(37, 99, 235, 0.22);
        font-weight: 500;
      }

      .msg-bot {
        align-self: flex-start;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-bottom-left-radius: 6px;
        color: var(--text-primary);
        box-shadow: var(--shadow-sm);
      }

      .msg-bot strong {
        color: var(--text-primary);
        font-weight: 600;
        letter-spacing: 0;
      }

      .msg-bot ul,
      .msg-bot ol {
        margin: 10px 0;
        padding-left: 22px;
      }

      .msg-bot li {
        margin-bottom: 6px;
        color: var(--text-primary);
      }

      .msg-bot li::marker { color: var(--text-muted); }

      .msg-bot blockquote {
        border-left: 3px solid var(--accent);
        background: var(--accent-soft);
        padding: 12px 16px;
        margin: 14px 0;
        border-radius: 0 10px 10px 0;
        color: var(--text-secondary);
        font-style: normal;
      }

      .msg-bot h1,
      .msg-bot h2,
      .msg-bot h3 {
        margin: 16px 0 8px 0;
        font-size: 14.5px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: 0;
        padding-bottom: 0;
        border-bottom: none;
      }
      .msg-bot h1:first-child,
      .msg-bot h2:first-child,
      .msg-bot h3:first-child { margin-top: 4px; }

      .msg-bot p {
        margin-bottom: 10px;
        color: var(--text-primary);
      }

      .msg-bot p:last-child { margin-bottom: 0; }

      .msg-bot a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(79,140,255,0.3);
        transition: var(--transition);
      }
      .msg-bot a:hover { border-bottom-color: var(--accent); }

      .msg-bot code {
        background: var(--bg-input);
        padding: 2px 7px;
        border-radius: 5px;
        font-size: 12.5px;
        font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
        color: #e2e8f0;
        border: 1px solid var(--border-subtle);
      }

      .msg-bot pre {
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        padding: 14px 16px;
        border-radius: 10px;
        overflow-x: auto;
        margin: 12px 0;
        font-size: 13px;
      }
      .msg-bot pre code {
        background: transparent;
        border: none;
        padding: 0;
      }

      /* Typing Indicator */
      .typing-indicator {
        display: flex;
        gap: 5px;
        padding: 6px 0;
        align-items: center;
      }

      .typing-indicator span {
        width: 7px;
        height: 7px;
        background: var(--text-muted);
        border-radius: 50%;
        animation: bounce 1.3s infinite ease-in-out;
      }

      .typing-indicator span:nth-child(1) { animation-delay: 0s; }
      .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Videos */
      .videos-container {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-top: 16px;
        margin-top: 16px;
        border-top: 1px solid var(--border-subtle);
        scrollbar-width: thin;
      }

      .video-card {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        border: 1px solid var(--border-subtle);
        overflow: hidden;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 210px;
        flex-shrink: 0;
      }

      .video-card:hover {
        transform: translateY(-4px);
        border-color: var(--accent-blue);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: var(--shadow-md);
      }

      .video-play-area {
        height: 120px;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        position: relative;
      }

      .play-icon-wrapper {
        width: 48px;
        height: 48px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.2rem;
        transition: all 0.3s ease;
      }

      .video-card:hover .play-icon-wrapper {
        transform: scale(1.1);
        background: var(--accent-blue);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
      }

      .video-info {
        padding: 12px;
      }

      .video-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-primary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.4;
      }

      /* Recommendation Links */
      .links-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed var(--border-subtle);
      }

      .recommendation-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        background: var(--bg-elevated);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
        color: var(--text-primary);
        text-decoration: none !important;
        font-size: 13.5px;
        font-weight: 500;
        transition: var(--transition);
        border-bottom: none !important;
      }

      .recommendation-link:hover {
        background: var(--bg-card-hover);
        border-color: var(--accent);
        transform: translateY(-1.5px);
        box-shadow: var(--shadow-sm);
      }

      .recommendation-link i {
        font-size: 14px;
        color: var(--accent);
      }

      /* Footer */
      footer {
        padding: 14px 24px 22px;
        background: linear-gradient(180deg, transparent, var(--bg-primary) 30%);
        border-top: 1px solid transparent;
      }

      .chat-input-wrapper {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-xl);
        display: flex;
        flex-direction: column;
        transition: var(--transition);
        max-width: 920px;
        margin: 0 auto;
        box-shadow: var(--shadow-md);
      }

      .chat-input-wrapper:hover { border-color: var(--border-hover); }

      .chat-input-wrapper:focus-within {
        border-color: var(--accent);
        box-shadow: var(--shadow-glow);
      }

      .image-preview-container {
        display: none;
        gap: 10px;
        padding: 14px 14px 0;
        flex-wrap: wrap;
      }

      .image-preview-item {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border-subtle);
      }

      .image-preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .image-preview-actions {
        position: absolute;
        top: -6px;
        right: -6px;
      }

      .image-preview-btn {
        width: 22px;
        height: 22px;
        background: var(--bg-elevated);
        color: var(--text-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        cursor: pointer;
        border: 1px solid var(--border-color);
        transition: var(--transition);
        box-shadow: var(--shadow-sm);
      }

      .image-preview-btn:hover {
        background: var(--danger);
        border-color: var(--danger);
        color: white;
      }

      .chat-input-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
      }

      input#messageInput {
        flex: 1;
        padding: 12px 10px;
        background: transparent;
        border: none;
        color: var(--text-primary);
        outline: none;
        font-size: 14.5px;
        font-family: inherit;
        font-weight: 400;
      }

      input#messageInput::placeholder {
        color: var(--text-muted);
        font-weight: 400;
      }

      .btn-icon {
        width: 38px;
        height: 38px;
        background: transparent;
        border: none;
        border-radius: 10px;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: var(--transition);
        flex-shrink: 0;
      }

      .btn-icon:hover {
        background: var(--bg-input);
        color: var(--text-primary);
      }

      .btn-icon:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-icon:disabled:hover {
        background: transparent;
        color: var(--text-muted);
      }

      .btn-icon.is-recording {
        background: rgba(242, 85, 85, 0.1);
        color: var(--danger);
      }

      .send-btn {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong)) !important;
        color: white !important;
        border-radius: 10px;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.28);
      }

      .send-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.38);
        opacity: 1;
      }

      .send-btn:active { transform: translateY(0); }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        header {
          padding: 12px 16px;
          gap: 12px;
        }

        .header-left { gap: 12px; flex: 1; min-width: 0; }
        .header-nav { padding: 3px; }
        .nav-btn span { display: none; }
        .nav-btn { padding: 8px 10px; }
        .logo-icon img { height: 64px !important; }
        .logo-text { font-size: 15px; }
        .sidebar-toggle { display: inline-flex; }

        .chat-sidebar {
          position: fixed;
          inset: 0 auto 0 0;
          width: min(320px, 86vw);
          flex-basis: auto;
          z-index: 40;
          transform: translateX(-100%);
          transition: transform 0.22s ease;
          box-shadow: var(--shadow-lg);
        }

        body.sidebar-open .chat-sidebar {

    <script src="./static/js/config.js"></script>

    <script>
      const messagesDiv = document.getElementById("messages");
      const input = document.getElementById("messageInput");
      const fileInput = document.getElementById("fileInput");
      const attachBtn = document.getElementById("attach");
      const sendBtn = document.getElementById("send");
      const btnMyVideos = document.getElementById("btnMyVideos");
      const btnReport = document.getElementById("btnReport");
      const btnVoice = document.getElementById("btnVoice");
      const btnSidebar = document.getElementById("btnSidebar");
      const btnNewChat = document.getElementById("btnNewChat");
      const btnSearchChats = document.getElementById("btnSearchChats");
      const sidebarOverlay = document.getElementById("sidebarOverlay");
      const sidebarSearch = document.getElementById("sidebarSearch");
      const chatHistorySearch = document.getElementById("chatHistorySearch");
      const chatHistoryList = document.getElementById("chatHistoryList");

      let lastAnalysisText = "";
      let isVoiceActive = false;
      let chatHistoryItems = [];
      let activeHistoryKey = null;
      let currentThreadHistory = [];

      // Auth check
      if (typeof Auth !== 'undefined' && !Auth.isAuthenticated()) {
        window.location.href = "login.html";
      } else {
        const user = Auth.getUser();
        if (user && user.is_premium) {
          document.getElementById('navDashboard').style.display = 'inline-flex';
          document.getElementById('btnMyVideos').style.display = 'inline-flex';
        }
      }

      // Voice support: o fluxo usa MediaRecorder/getUserMedia, nao Web Speech.
      const supportsVoiceInput = Boolean(
        navigator.mediaDevices &&
        navigator.mediaDevices.getUserMedia &&
        window.MediaRecorder &&
        (window.AudioContext || window.webkitAudioContext)
      );

      if (!supportsVoiceInput) {
        btnVoice.disabled = true;
        btnVoice.title = "Voz indisponivel neste navegador ou conexao.";
        btnVoice.setAttribute("aria-label", "Voz indisponivel");
      }

      // Voice handlers
      let mediaRecorder = null;
      let audioChunks = [];
      let isHandsFreeActive = false;
      let silenceTimeout = null;
      let audioContext = null;
      let analyser = null;
      let microphone = null;
      let streamGlobal = null;
      let hasDetectedSoundInSegment = false;

      btnVoice.addEventListener("click", async () => {
        if (!supportsVoiceInput) {
          input.placeholder = "Voz indisponivel neste navegador.";
          return;
        }

        if (!isHandsFreeActive) {
          startHandsFree();
        } else {
          stopHandsFree();
        }
      });

      async function startHandsFree() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          streamGlobal = stream;
          isHandsFreeActive = true;
          btnVoice.classList.add("is-recording");
          
          setupSilenceDetection(stream);
          startRecordingSegment();
        } catch (err) {
          console.error("Mic error:", err);
          input.placeholder = "Sem acesso ao microfone.";
        }
      }

      function setupSilenceDetection(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);
        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        const checkSilence = () => {
          if (!isHandsFreeActive) return;
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
          let average = sum / bufferLength;

          if (average > 15) {
            hasDetectedSoundInSegment = true;
            if (silenceTimeout) {
              clearTimeout(silenceTimeout);
              silenceTimeout = null;
            }
          } else if (hasDetectedSoundInSegment) {
            if (!silenceTimeout) {
              silenceTimeout = setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                  mediaRecorder.stop();
                }
              }, 5000);
            }
          }
          requestAnimationFrame(checkSilence);
        };
        checkSilence();
      }

      function startRecordingSegment() {
        if (!isHandsFreeActive) return;
        
        hasDetectedSoundInSegment = false;
        mediaRecorder = new MediaRecorder(streamGlobal);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
          if (hasDetectedSoundInSegment && audioChunks.length > 0) {
            sendVoiceToBackend(audioBlob);
          }
          
          if (isHandsFreeActive) {
            startRecordingSegment();
          }
        };

        mediaRecorder.start();
        input.placeholder = "Ouvindo... Fale agora.";
      }

      function stopHandsFree() {
        isHandsFreeActive = false;
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
        if (streamGlobal) {
          streamGlobal.getTracks().forEach(track => track.stop());
        }
        if (audioContext) {
          audioContext.close();
        }
        if (silenceTimeout) {
          clearTimeout(silenceTimeout);
          silenceTimeout = null;
        }
        btnVoice.classList.remove("is-recording");
        input.placeholder = "Pergunte sobre seu veículo...";
      }

      async function sendVoiceToBackend(blob) {
        const formData = new FormData();
        formData.append("audio", blob, "voice.webm");
        formData.append("ignore_global_history", "true");
        formData.append("client_history", JSON.stringify(currentThreadHistory));

        const file = fileInput.files[0];
        if (file) {
          const reader = new FileReader();
          const imageBase64 = await new Promise((r) => {
            reader.onload = () => r(reader.result);
            reader.readAsDataURL(file);
          });
          formData.append("image", imageBase64);
          
          fileInput.value = "";
          document.getElementById("imagePreviewContainer").style.display = "none";
          document.getElementById("imagePreviewContainer").innerHTML = "";
        }

        addMessage(file ? "Áudio enviado com imagem anexada" : "Áudio enviado", "msg-user");
        const typingDiv = addMessage(
          '<div class="typing-indicator"><span></span><span></span><span></span></div>',
          "msg-bot",
          true
        );

        try {
          const res = await Auth.authenticatedFetch("/api/voice", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();
          if (data.error) {
            typingDiv.textContent = data.error;
          } else {
            const userMsgs = document.querySelectorAll(".msg-user");
            userMsgs[userMsgs.length - 1].textContent = data.text;
            
            const cleanHtml = DOMPurify.sanitize(marked.parse(data.response));
            typingDiv.innerHTML = cleanHtml;
            appendVideosToDiv(typingDiv, data.videos);
            appendLinksToDiv(typingDiv, data.links);
            lastAnalysisText = data.response;
            appendToCurrentThread(data.text, data.response);
            addChatToHistory(data.chat || {
              mensagem_usuario: data.text,
              resposta_ia: data.response,
              created_at: new Date().toISOString(),
              videos: data.videos || [],
              links: data.links || [],
              topic: "",
            });
        }
        } catch (err) {
          typingDiv.textContent = "Erro ao processar voz.";
        }
        scrollToBottom();
      }

      function appendVideosToDiv(div, videos) {
        if (videos && videos.length > 0) {
          const vContainer = document.createElement("div");
          vContainer.className = "videos-container";
          
          videos.forEach(v => {
            const vCard = document.createElement("div");
            vCard.className = "video-card";
            
            // Sanitização básica para atributos
            const safeUrl = (v.url || "").replace(/"/g, '&quot;');
            const safeThumb = (v.thumbnail || "").replace(/"/g, '&quot;');
            const safeTitleAttr = (v.titulo || "").replace(/"/g, '&quot;');
            
            vCard.innerHTML = `
              <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="video-play-area">
                <div class="play-icon-wrapper">
                    <i class="fas fa-play"></i>
                </div>
              </a>
              <div class="video-info">
                <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">
                  <div class="video-title" title="${safeTitleAttr}"></div>
                </a>
              </div>
            `;
            // Usar textContent para o título
            const titleDiv = vCard.querySelector('.video-title');
            if (titleDiv) titleDiv.textContent = v.titulo || "";
            
            vContainer.appendChild(vCard);
          });
          div.appendChild(vContainer);
          scrollToBottom();
        }
      }

      // Chat Logic
      const scrollToBottom = () => {
        setTimeout(() => {
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 100);
      };

      const normalizeHistoryText = (value = "") =>
        String(value)
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();

      const genericChatTokens = new Set([
        "ai",
        "bem",
        "boa",
        "bom",
        "dia",
        "e",
        "noite",
        "obrigada",
        "obrigado",
        "oi",
        "ola",
        "opa",
        "salve",
        "tarde",
        "tudo",
        "valeu",
      ]);

      const isGenericHistoryMessage = (value = "") => {
        const tokens = normalizeHistoryText(value).match(/[a-z0-9]+/g) || [];
        return tokens.length > 0 && tokens.length <= 5 && tokens.every((token) => genericChatTokens.has(token));
      };

      const makeHistoryKey = (chat, index) =>
        String(chat.id || `${chat.created_at || "chat"}-${index}`);

      const getHistoryTitle = (chat) => {
        const topic = (chat.topic || "").trim();
        const message = (chat.mensagem_usuario || "").trim();
        if (topic && normalizeHistoryText(topic) !== "consultoria geral") return topic;
        return message || "Conversa sem título";
      };

      const formatHistoryDate = (value) => {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return date.toLocaleString("pt-BR", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      };

      function setSidebarOpen(open) {
        document.body.classList.toggle("sidebar-open", open);
        btnSidebar?.setAttribute("aria-expanded", String(open));
      }

      function renderHistoryList() {
        if (!chatHistoryList) return;
        const query = normalizeHistoryText(chatHistorySearch?.value || "");
        const items = chatHistoryItems
          .map((chat, index) => ({ chat, index, key: makeHistoryKey(chat, index) }))
          .reverse()
          .filter(({ chat }) => {
            if (!query) return true;
            return normalizeHistoryText([
              chat.topic,
              chat.mensagem_usuario,
              chat.resposta_ia,
            ].join(" ")).includes(query);
          });

        chatHistoryList.innerHTML = "";
        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "history-empty";
          empty.textContent = query ? "Nenhum histórico encontrado." : "Nenhum histórico ainda.";
          chatHistoryList.appendChild(empty);
          return;
        }

        items.forEach(({ chat, index, key }) => {
          const row = document.createElement("div");
          row.className = `history-chat-row${activeHistoryKey === key ? " is-active" : ""}`;

          const button = document.createElement("button");
          button.type = "button";
          button.className = "history-chat-item";
          button.title = formatHistoryDate(chat.created_at);

          const title = document.createElement("span");
          title.className = "history-chat-title";
          title.textContent = getHistoryTitle(chat);

          button.appendChild(title);
          button.addEventListener("click", () => renderSingleChat(chat, index));

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "history-delete-btn";
          deleteButton.title = "Excluir chat";
          deleteButton.setAttribute("aria-label", `Excluir chat ${getHistoryTitle(chat)}`);
          deleteButton.innerHTML = '<i class="fas fa-trash-alt" aria-hidden="true"></i>';
          deleteButton.addEventListener("click", (event) => {
            event.stopPropagation();
            deleteChatHistory(chat, index, key, deleteButton);
          });

          row.appendChild(button);
          row.appendChild(deleteButton);
          chatHistoryList.appendChild(row);
        });
      }

      async function deleteChatHistory(chat, index, key, button) {
        if (!chat?.id) {
          chatHistoryItems = chatHistoryItems.filter((_, itemIndex) => itemIndex !== index);
          if (activeHistoryKey === key) {
            activeHistoryKey = null;
            currentThreadHistory = [];
            messagesDiv.innerHTML = "";
            lastAnalysisText = "";
          }
          if (typeof Auth !== 'undefined') {
            Auth.Cache.set('autoassist_chat_history_cache', chatHistoryItems);
          }
          renderHistoryList();
          return;
        }

        button.disabled = true;
        try {
          const res = await Auth.authenticatedFetch(`/api/chat/history/${encodeURIComponent(chat.id)}`, {
            method: "DELETE",
          });

          if (!res.ok) {
            throw new Error("Falha ao excluir chat");
          }

          chatHistoryItems = chatHistoryItems.filter((item) => String(item.id) !== String(chat.id));
          if (activeHistoryKey === key) {
            activeHistoryKey = null;
            currentThreadHistory = [];
            messagesDiv.innerHTML = "";
            lastAnalysisText = "";
          }
          if (typeof Auth !== 'undefined') {
            Auth.Cache.set('autoassist_chat_history_cache', chatHistoryItems);
          }
          renderHistoryList();
        } catch (error) {
          console.warn("Erro ao excluir chat:", error);
          alert("Não foi possível excluir este chat.");
          button.disabled = false;
        }
      }

      function renderChatEntry(chat) {
        addMessage(chat.mensagem_usuario || "Imagem anexada", "msg-user");

        let cleanHtml = "";
        try {
          const rawHtml = marked.parse(chat.resposta_ia || "");
          cleanHtml = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(rawHtml) : rawHtml;
        } catch (e) {
          cleanHtml = "Erro ao renderizar mensagem.";
        }

        const showAttachments = !isGenericHistoryMessage(chat.mensagem_usuario);
        addMessage(
          cleanHtml,
          "msg-bot",
          true,
          showAttachments ? chat.videos : [],
          showAttachments ? chat.links : []
        );
      }

      function historyFromChat(chat) {
        const history = [];
        const userMessage = (chat?.mensagem_usuario || "").trim();
        const assistantMessage = (chat?.resposta_ia || "").trim();
        if (userMessage) history.push({ role: "user", content: userMessage });
        if (assistantMessage) history.push({ role: "model", content: assistantMessage });
        return history;
      }

      function appendToCurrentThread(userMessage, assistantMessage) {
        if (userMessage) currentThreadHistory.push({ role: "user", content: userMessage });
        if (assistantMessage) currentThreadHistory.push({ role: "model", content: assistantMessage });
        currentThreadHistory = currentThreadHistory.slice(-8);
      }

      function renderSingleChat(chat, index) {
        messagesDiv.innerHTML = "";
        activeHistoryKey = makeHistoryKey(chat, index);
        currentThreadHistory = historyFromChat(chat);
        renderHistoryList();
        renderChatEntry(chat);
        lastAnalysisText = chat.resposta_ia || "";
        setSidebarOpen(false);
        scrollToBottom();
      }

      function addChatToHistory(chat) {
        if (!chat) return;
        chatHistoryItems = [...chatHistoryItems, chat];
        activeHistoryKey = makeHistoryKey(chat, chatHistoryItems.length - 1);
        if (typeof Auth !== 'undefined') {
          Auth.Cache.set('autoassist_chat_history_cache', chatHistoryItems);
        }
        renderHistoryList();
      }

    function appendLinksToDiv(div, links) {
        if (links && links.length > 0) {
            const lContainer = document.createElement("div");
            lContainer.className = "links-container";
            
            links.forEach(l => {
                const a = document.createElement("a");
                a.className = "recommendation-link";
                a.href = l.url;
                a.target = "_blank";
                a.rel = "noopener noreferrer";
                a.innerHTML = `<i class="${l.icon || 'fas fa-external-link-alt'}"></i> <span>${l.titulo}</span>`;
                lContainer.appendChild(a);
            });
            div.appendChild(lContainer);
            scrollToBottom();
        }
    }

    function addMessage(text, cls, isHtml = false, videos = [], links = []) {
        const isUser = cls.includes("msg-user");
        const isBot = cls.includes("msg-bot");
        const row = document.createElement("div");
        row.className = `message-row ${isUser ? "message-row-user" : "message-row-bot"}`;

        if (isBot) {
          const avatar = document.createElement("div");
          avatar.className = "message-avatar";
          avatar.setAttribute("aria-hidden", "true");

          const avatarImg = document.createElement("img");
          avatarImg.src = "static/logo2.png?v=20260506";
          avatarImg.alt = "";
          avatar.appendChild(avatarImg);
          row.appendChild(avatar);
        }

        const stack = document.createElement("div");
        stack.className = "message-stack";

        const meta = document.createElement("div");
        meta.className = "message-meta";
        meta.textContent = isUser ? "Você" : "AutoAssist";

        const div = document.createElement("div");
        div.className = cls;
        if (isHtml) {
          div.innerHTML = text;
        } else {
          div.textContent = text;
        }
        stack.appendChild(meta);
        stack.appendChild(div);
        row.appendChild(stack);
        messagesDiv.appendChild(row);
        
        appendVideosToDiv(div, videos);
        appendLinksToDiv(div, links);
        
        scrollToBottom();
        return div;
    }

      const sendMessage = async () => {
        const msg = input.value.trim();
        const file = fileInput.files[0];
        if (!msg && !file) return;

        const userMessageText = msg || "Imagem anexada";
        addMessage(
          `${userMessageText}${file && msg ? " [Imagem anexada]" : ""}`,
          "msg-user"
        );

        input.value = "";
        fileInput.value = "";
        document.getElementById("imagePreviewContainer").style.display = "none";
        document.getElementById("imagePreviewContainer").innerHTML = "";

        const typingDiv = addMessage(
          '<div class="typing-indicator"><span></span><span></span><span></span></div>',
          "msg-bot",
          true
        );
        typingDiv.id = "typing";

        try {
          let payload = {
            message: msg,
            category: "automotivo",
            ignore_global_history: true,
            client_history: currentThreadHistory,
          };
          if (file) {
            const reader = new FileReader();
            payload.image = await new Promise((r) => {
              reader.onload = () => r(reader.result);
              reader.readAsDataURL(file);
            });
          }

          const res = await Auth.authenticatedFetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          const botResponse = data.response || data.text || "Desculpe, não consegui processar.";
          lastAnalysisText = botResponse;

          const cleanHtml = DOMPurify.sanitize(marked.parse(botResponse));
          typingDiv.innerHTML = cleanHtml;
          appendVideosToDiv(typingDiv, data.videos);
          appendLinksToDiv(typingDiv, data.links);
          typingDiv.id = "";
          appendToCurrentThread(msg, botResponse);
          addChatToHistory(data.chat || {
            mensagem_usuario: msg,
            resposta_ia: botResponse,
            created_at: new Date().toISOString(),
            videos: data.videos || [],
            links: data.links || [],
            topic: "",
          });

        } catch (err) {
          typingDiv.innerHTML = "<strong>Erro:</strong> Falha na conexão.";
        }
        scrollToBottom();
      };

      // Events
      sendBtn.addEventListener("click", sendMessage);
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      btnSidebar?.addEventListener("click", () => {
        setSidebarOpen(!document.body.classList.contains("sidebar-open"));
      });

      sidebarOverlay?.addEventListener("click", () => setSidebarOpen(false));

      btnNewChat?.addEventListener("click", () => {
        activeHistoryKey = null;
        currentThreadHistory = [];
        messagesDiv.innerHTML = "";
        lastAnalysisText = "";
        renderHistoryList();
        setSidebarOpen(false);
        input.focus();
      });

      btnSearchChats?.addEventListener("click", () => {
        const isOpen = sidebarSearch.classList.toggle("is-open");
        if (isOpen) {
          chatHistorySearch.focus();
        } else {
          chatHistorySearch.value = "";
          renderHistoryList();
        }
      });

      chatHistorySearch?.addEventListener("input", renderHistoryList);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") setSidebarOpen(false);
      });
      
      attachBtn.addEventListener("click", () => fileInput.click());
      
      fileInput.addEventListener("change", () => {
        const container = document.getElementById("imagePreviewContainer");
        if (fileInput.files[0]) {
          const file = fileInput.files[0];
          const reader = new FileReader();
          
          reader.onload = function(e) {
            container.innerHTML = `
              <div class="image-preview-item">
                <img src="${e.target.result}" alt="Preview">
                <div class="image-preview-actions">
                  <div class="image-preview-btn" id="removeImageBtn" title="Remover">
                    <i class="fas fa-times"></i>
                  </div>
                </div>
              </div>
            `;
            container.style.display = "flex";
            
            document.getElementById("removeImageBtn").addEventListener("click", () => {
              fileInput.value = "";
              container.style.display = "none";
              container.innerHTML = "";
            });
          }
          
          reader.readAsDataURL(file);
        } else {
          container.style.display = "none";
          container.innerHTML = "";
        }
      });

      document.getElementById("logout").addEventListener("click", () => {
        if (typeof Auth !== 'undefined') Auth.logout();
      });

      // Report
      btnReport.addEventListener("click", async () => {
        if (!lastAnalysisText) return alert("Faça uma análise primeiro.");
        btnReport.disabled = true;
        try {
          const res = await Auth.authenticatedFetch("/api/report", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: lastAnalysisText }),
          });
          let data = {};
          try {
            data = await res.json();
          } catch {
            data = {};
          }

          if (!res.ok) {
            alert(data.error || "Erro ao gerar PDF.");
            return;
          }

          if (data.url && typeof CONFIG !== 'undefined') {
            window.open(`${CONFIG.API_URL}${data.url}`, "_blank");
            return;
          }

          alert("PDF gerado sem URL de download.");
        } catch (e) {
          alert("Erro ao gerar PDF.");
        } finally {
          btnReport.disabled = false;
        }
      });

      // Load history
      (async () => {
        if (typeof Auth === 'undefined') {
          renderHistoryList();
          return;
        }

        // Tenta carregar do cache para resposta instantânea
        const cachedHistory = Auth.Cache.get('autoassist_chat_history_cache');
        if (cachedHistory) {
          renderChatHistory(cachedHistory);
        }

        try {
          const res = await Auth.authenticatedFetch("/api/chat/history");
          if (res.ok) {
            const data = await res.json();
            if (data.chats) {
              Auth.Cache.set('autoassist_chat_history_cache', data.chats);
              renderChatHistory(data.chats);
            }
          }
          if (!chatHistoryItems.length) renderHistoryList();
        } catch (error) {
          console.warn('Erro ao carregar histórico do chat:', error);
          if (!chatHistoryItems.length) renderHistoryList();
        }
      })();

      function renderChatHistory(chats) {
        chatHistoryItems = Array.isArray(chats) ? chats : [];
        activeHistoryKey = null;
        renderHistoryList();
        if (!chatHistoryItems.length) return;

        messagesDiv.innerHTML = "";
        const latestIndex = chatHistoryItems.length - 1;
        renderSingleChat(chatHistoryItems[latestIndex], latestIndex);
      }
    </script>
  </body>
</html>
