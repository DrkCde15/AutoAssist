<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Feedbacks - AutoAssist</title>
    <link rel="icon" type="image/png" href="static/logo2.png?v=20260506">
    <link rel="shortcut icon" type="image/png" href="static/logo2.png?v=20260506">
    <link rel="manifest" href="/manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-card: #1c1c1f;
            --bg-input: #27272a;
            --border-color: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 800;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-logo img {
            height: 72px !important;
            width: auto;
        }
        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
            transform: translateY(-1px);
        }
        .nav-link.active {
            color: var(--accent);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 64px 24px;
        }
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header h1 {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 18px;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
        }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-title i {
            color: var(--accent);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }
        .rating {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .star {
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }
        .star:hover, .star.active {
            color: var(--warning);
            transform: scale(1.1);
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        /* Recent Feedbacks */
        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .feedback-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
        }
        .feedback-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .feedback-user {
            font-weight: 600;
            font-size: 14px;
        }
        .feedback-stars {
            color: var(--warning);
            font-size: 12px;
        }
        .feedback-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .feedback-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
        }
        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 32px;
            }
            .nav-links {
                display: none;
            }
        }
        .feedback-actions {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:hover {
            color: var(--text-primary);
        }
        .action-btn.delete:hover {
            color: #ef4444;
        }
        .edit-mode .feedback-text {
            display: none;
        }
        .edit-form {
            display: none;
            margin-top: 12px;
        }
        .edit-mode .edit-form {
            display: block;
        }
        .edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
        }
        .btn-cancel {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--success);
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
</style>
    <link rel="stylesheet" href="static/css/responsive.css">
  <link rel="stylesheet" href="static/css/shared.css">
  <link rel="stylesheet" href="static/css/notifications.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">
            <img src="logo.png?v=20260511" alt="AutoAssist">
            AutoAssist
        </a>
        <div class="nav-links" id="navLinks">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Início</a>
            <a href="chat.html" class="nav-link"><i class="fas fa-comments"></i> Chat</a>
            <a href="feedback.html" class="nav-link active"><i class="fas fa-star"></i> Feedbacks</a>
            <a href="login.html" class="nav-link"><i class="fas fa-sign-in-alt"></i> Entrar</a>
            <a href="cadastro.html" class="nav-link"><i class="fas fa-user-plus"></i> Criar conta</a>
            <div id="notif-bell-container"></div>
        </div>
    </div>
</nav>

<main class="container">
    <header class="header">
        <h1>Sua opinião é <span>fundamental</span></h1>
        <p>Ajude-nos a construir o futuro da assistência automotiva inteligente.</p>
    </header>

    <div class="layout">
        <!-- Feedback Form -->
        <section class="card">
            <h2 class="card-title"><i class="fas fa-pen-nib"></i> Deixe seu Feedback</h2>
            <form id="feedbackForm">
                <div class="form-group">
                    <label>Como você avalia sua experiência?</label>
                    <div class="rating" id="starRating">
                        <i class="fas fa-star star active" data-value="1"></i>
                        <i class="fas fa-star star active" data-value="2"></i>
                        <i class="fas fa-star star active" data-value="3"></i>
                        <i class="fas fa-star star active" data-value="4"></i>
                        <i class="fas fa-star star active" data-value="5"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="userName">Seu Nome (Opcional)</label>
                    <input type="text" id="userName" class="form-control" placeholder="Ex: Júlio César">
                </div>

                <div class="form-group">
                    <label for="userEmail">Seu Email (Opcional)</label>
                    <input type="email" id="userEmail" class="form-control" placeholder="exemplo@email.com">
                </div>

                <div class="form-group">
                    <label for="comment">Seu Comentário</label>
                    <textarea id="comment" class="form-control" placeholder="Conte-nos o que você achou, sugestões ou críticas..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <i class="fas fa-paper-plane"></i>
                    Enviar Feedback
                </button>
            </form>
        </section>

        <!-- Feedback List -->
        <section>
            <h2 class="card-title"><i class="fas fa-comments"></i> O que dizem nossos usuários</h2>
            <div class="feedback-list" id="feedbackList">
                <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                    <i class="fas fa-spinner fa-spin"></i> Carregando feedbacks...
                </div>
            </div>
        </section>
    </div>
</main>

<div class="toast" id="toast">
    <div style="display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-check-circle" style="color: var(--success); font-size: 20px;"></i>
        <div>
            <div style="font-weight: 700;">Sucesso!</div>
            <div style="font-size: 13px; color: var(--text-secondary);">Seu feedback foi enviado e alertado ao administrador.</div>
        </div>
    </div>
</div>

<script src="static/js/config.js"></script>
<script src="static/js/auth.js"></script>
<script src="static/js/notifications.js" defer></script>
<script src="static/js/responsive.js" defer></script>
<script>
    let selectedStars = 5;
    const API_BASE = (typeof CONFIG !== 'undefined' && typeof CONFIG.API_URL === 'string') ? CONFIG.API_URL : '';

    function isAuthenticated() {
        return typeof Auth !== 'undefined' && Auth.isAuthenticated();
    }

    function getCurrentUser() {
        return isAuthenticated() ? Auth.getUser() : null;
    }

    function renderNavigation() {
        const navLinks = document.getElementById('navLinks');
        if (!navLinks || !isAuthenticated()) return;

        const user = getCurrentUser();
        navLinks.innerHTML = `
            ${user?.is_premium ? '<a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>' : ''}
            <a href="chat.html" class="nav-link"><i class="fas fa-comments"></i> Chat</a>
            <a href="maintenance_history.html" class="nav-link"><i class="fas fa-history"></i> Anotações</a>
            ${user?.is_premium ? '<a href="library.html" class="nav-link"><i class="fas fa-book"></i> Biblioteca</a>' : ''}
            <a href="feedback.html" class="nav-link active"><i class="fas fa-star"></i> Feedbacks</a>
            <a href="perfil.html" class="nav-link"><i class="fas fa-user"></i> Perfil</a>
            <div id="notif-bell-container"></div>
            <button type="button" class="nav-link" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Sair</button>
        `;

        document.getElementById('btnLogout')?.addEventListener('click', () => Auth.logout());
    }

    document.querySelectorAll('.star').forEach(star => {
        star.addEventListener('click', () => {
            selectedStars = parseInt(star.getAttribute('data-value'));
            updateStars();
        });
    });

    function updateStars() {
        document.querySelectorAll('.star').forEach(star => {
            const val = parseInt(star.getAttribute('data-value'));
            if (val <= selectedStars) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
    }

    function escapeHTML(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    async function loadFeedbacks() {
        try {
            const res = await fetch(`${API_BASE}/api/feedbacks`);
            const data = await res.json();
            const container = document.getElementById('feedbackList');
            const currentUser = getCurrentUser();

            if (!data.feedbacks || data.feedbacks.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 40px;">Nenhum feedback ainda. Seja o primeiro!</div>';
                return;
            }

            container.innerHTML = data.feedbacks.map(f => {
                const stars = Math.max(1, Math.min(Number(f.estrelas) || 5, 5));
                const createdAt = f.created_at ? new Date(f.created_at).toLocaleDateString('pt-BR') : '';
                const isOwner = currentUser && (f.user_id == currentUser.id);

                return `
                <div class="feedback-item" id="feedback-${f.id}">
                    <div class="feedback-meta">
                        <div>
                            <span class="feedback-user">${escapeHTML(f.nome || 'Usuario Anonimo')}</span>
                            <div class="feedback-stars">
                                ${Array(5).fill(0).map((_, i) => `<i class="${i < stars ? 'fas' : 'far'} fa-star"></i>`).join('')}
                            </div>
                        </div>
                        ${isOwner ? `
                        <div class="feedback-actions">
                            <button class="action-btn" onclick="enterEditMode(${f.id})">
                                <i class="fas fa-edit"></i> Editar
                            </button>
                            <button class="action-btn delete" onclick="deleteFeedback(${f.id})">
                                <i class="fas fa-trash"></i> Excluir
                            </button>
                        </div>
                        ` : ''}
                    </div>
                    <div class="feedback-text">${escapeHTML(f.comentario)}</div>

                    <div class="edit-form">
                        <div class="form-group">
                            <div class="rating edit-stars" id="edit-stars-${f.id}">
                                ${Array(5).fill(0).map((_, i) => `
                                    <i class="fas fa-star star ${i < stars ? 'active' : ''}"
                                       data-value="${i + 1}"
                                       onclick="setEditStars(${f.id}, ${i + 1})"></i>
                                `).join('')}
                            </div>
                        </div>
                        <textarea class="form-control" id="edit-comment-${f.id}">${escapeHTML(f.comentario)}</textarea>
                        <div class="edit-actions">
                            <button class="btn-submit btn-small" onclick="saveEdit(${f.id})">Salvar</button>
                            <button class="btn-cancel btn-small" onclick="cancelEdit(${f.id})">Cancelar</button>
                        </div>
                    </div>

                    <div class="feedback-date">${escapeHTML(createdAt)}</div>
                </div>
            `}).join('');
        } catch (err) {
            console.error('Erro ao carregar feedbacks:', err);
        }
    }

    let editingStarsMap = {};

    function enterEditMode(id) {
        const item = document.getElementById(`feedback-${id}`);
        item.classList.add('edit-mode');

        // Initialize editing stars with current value
        const activeStars = item.querySelectorAll('.edit-stars .star.active').length;
        editingStarsMap[id] = activeStars || 5;
    }

    function cancelEdit(id) {
        const item = document.getElementById(`feedback-${id}`);
        item.classList.remove('edit-mode');
    }

    function setEditStars(feedbackId, val) {
        editingStarsMap[feedbackId] = val;
        const container = document.getElementById(`edit-stars-${feedbackId}`);
        container.querySelectorAll('.star').forEach((star, i) => {
            if (i < val) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
    }

    async function saveEdit(id) {
        const comment = document.getElementById(`edit-comment-${id}`).value;
        const stars = editingStarsMap[id] || 5;

        try {
            const res = await Auth.authenticatedFetch(`/api/feedback/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comentario: comment, estrelas: stars })
            });

            if (res.ok) {
                loadFeedbacks();
            } else {
                const err = await res.json();
                alert(err.error || 'Erro ao salvar alterações');
            }
        } catch (err) {
            alert('Erro de conexão');
        }
    }

    async function deleteFeedback(id) {
        if (!confirm('Tem certeza que deseja excluir seu feedback?')) return;

        try {
            const res = await Auth.authenticatedFetch(`/api/feedback/${id}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                loadFeedbacks();
            } else {
                const err = await res.json();
                alert(err.error || 'Erro ao excluir feedback');
            }
        } catch (err) {
            alert('Erro de conexão');
        }
    }

    document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

        const payload = {
            nome: document.getElementById('userName').value,
            email: document.getElementById('userEmail').value,
            estrelas: selectedStars,
            comentario: document.getElementById('comment').value
        };

        try {
            const requestOptions = {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            };
            const res = isAuthenticated()
                ? await Auth.authenticatedFetch('/api/feedback', requestOptions)
                : await fetch(`${API_BASE}/api/feedback`, requestOptions);

            if (res.ok) {
                showToast();
                document.getElementById('feedbackForm').reset();
                selectedStars = 5;
                updateStars();
                loadFeedbacks();
            } else {
                const contentType = (res.headers.get('content-type') || '').toLowerCase();
                let message = `Erro ao enviar feedback (HTTP ${res.status}).`;

                if (contentType.includes('application/json')) {
                    const err = await res.json().catch(() => null);
                    message = (err && (err.error || err.message)) || message;
                }

                alert(message);
            }
        } catch (err) {
            alert(err?.message || 'Erro de conexao.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Feedback';
        }
    });

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 5000);
    }

    renderNavigation();

    if (isAuthenticated()) {
        const user = getCurrentUser();
        if (user) {
            document.getElementById('userName').value = user.nome || '';
            document.getElementById('userEmail').value = user.email || '';
        }
    }

    loadFeedbacks();
</script>
<script>if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{})})}</script>
</body>
</html>
