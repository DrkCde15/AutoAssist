<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Biblioteca Automotiva - AutoAssist</title>
    <link rel="icon" type="image/png" href="static/logo2.png?v=20260506">
    <link rel="shortcut icon" type="image/png" href="static/logo2.png?v=20260506">
    <link rel="manifest" href="/manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
:root {
            --primary-dark: #0f172a;
            --secondary-dark: #1e293b;
            --accent-blue: #3b82f6;
            --text-gray: #94a3b8;
            --white: #ffffff;
            --danger-red: #ef4444;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-dark);
            color: white;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.05), transparent);
        }
        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .nav-logo img { height: 72px; width: auto; }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link:hover { opacity: 1; transform: translateY(-1px); }
        .nav-link.active { color: var(--accent-blue); opacity: 1; }
        /* Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .header-section {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header-section h1 {
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 15px;
        }
        .header-section h1 span {
            color: var(--accent-blue);
            font-weight: 700;
        }
        .header-section p {
            color: var(--text-gray);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }
        /* Library Grid */
        .topic-section {
            margin-bottom: 80px;
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .topic-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }
        .topic-header h2 {
            font-size: 24px;
            color: var(--white);
            text-transform: capitalize;
        }
        .topic-date {
            font-size: 12px;
            color: var(--text-gray);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        /* Video Card */
        .video-card {
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .video-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }
        .video-play-area {
            height: 140px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        .video-play-area::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .video-card:hover .video-play-area::after {
            opacity: 1;
        }
        .play-icon-wrapper {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }
        .video-card:hover .play-icon-wrapper {
            transform: scale(1.2);
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            border-color: transparent;
        }
        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }
        .video-card:hover .thumb-container img {
            transform: scale(1.1);
        }
        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transition: 0.3s;
        }
        .video-card:hover .play-overlay { opacity: 1; }
        .play-overlay i { font-size: 40px; color: white; }
        .play-overlay span { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .video-info { padding: 15px; }
        .video-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* Recommendation Links */
        .link-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(30, 41, 59, 0.5));
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }
        .link-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(30, 41, 59, 0.8));
        }
        .link-icon {
            width: 50px;
            height: 50px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--accent-blue);
        }
        .link-content h3 { font-size: 16px; margin-bottom: 5px; }
        .link-content p { font-size: 13px; color: var(--text-gray); }
        .link-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-blue);
        }
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
        }
        .empty-state i { font-size: 60px; color: var(--text-gray); opacity: 0.2; margin-bottom: 20px; }
        .empty-state h2 { font-weight: 300; color: var(--text-gray); }
        /* Loader */
        .loader-container { display: flex; justify-content: center; padding: 100px; }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 860px) {
            .header-section h1 { font-size: 32px; }
        }
</style>
    <link rel="stylesheet" href="static/css/responsive.css">
  <link rel="stylesheet" href="static/css/shared.css">
  <link rel="stylesheet" href="static/css/notifications.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png?v=20260511" alt="AutoAssist">
                AUTOASSIST
            </a>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="chat.html" class="nav-link"><i class="fas fa-comments"></i> Chat</a>
                <a href="maintenance_history.html" class="nav-link"><i class="fas fa-history"></i> Anotações</a>
                <a href="library.html" class="nav-link active"><i class="fas fa-book"></i> Biblioteca</a>
                <a href="perfil.html" class="nav-link"><i class="fas fa-user-circle"></i> Perfil</a>
                <div id="notif-bell-container"></div>
                <button onclick="Auth.logout()" class="nav-link" style="background:none; border:none; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Minha <span>Biblioteca</span> Automotiva</h1>
            <p>Seu acervo personalizado de vídeos e links sugeridos pela nossa IA durante suas conversas.</p>
        </div>

        <div id="libraryContent">
            <!-- Loader inicial -->
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <script src="static/js/config.js"></script>
<script src="static/js/auth.js"></script>
    <script src="static/js/security-utils.js"></script>
<script src="static/js/notifications.js" defer></script>
<script src="static/js/responsive.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            const user = await Auth.syncUser({ redirectOnInvalid: true });
            if (!user) return;

            if (!Auth.requirePremiumPage({
                title: 'Biblioteca Premium',
                message: 'Para acessar sua biblioteca automotiva, ative o plano Premium.',
                backHref: 'index.html'
            })) {
                return;
            }

            loadLibrary();
        });

        async function loadLibrary() {
            const content = document.getElementById('libraryContent');
            
            try {
                const res = await Auth.authenticatedFetch('/api/videos/library');
                if (!res.ok) throw new Error("Erro ao carregar biblioteca");
                
                const data = await res.json();
                
                if (!data.library || data.library.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-book-open"></i>
                            <h2>Sua biblioteca ainda está vazia.</h2>
                            <p style="color:var(--text-gray); margin-top:10px;">Interaja com o NOG no Chat para receber dicas, vídeos e recomendações personalizadas.</p>
                            <a href="chat.html" style="display:inline-block; margin-top:25px; color:var(--accent-blue); text-decoration:none; font-weight:600;">Ir para o Chat <i class="fas fa-arrow-right"></i></a>
                        </div>
                    `;
                    return;
                }

                content.innerHTML = data.library.map(topic => {
                    const date = new Date(topic.last_updated).toLocaleDateString('pt-BR');
                    
                    const mediaItems = [];
                    
                    // Adicionar vídeos
                    topic.videos.forEach(v => {
                        
                        mediaItems.push(`
                            <div class="video-card">
                                <a href="${v.url}" target="_blank" class="video-play-area">
                                    <div class="play-icon-wrapper">
                                        <i class="fas fa-play"></i>
                                    </div>
                                </a>
                                <div class="video-info">
                                    <div class="video-title">${v.titulo}</div>
                                </div>
                            </div>
                        `);
                    });

                    // Adicionar links
                    topic.links.forEach(l => {
                        mediaItems.push(`
                            <a href="${l.url}" target="_blank" rel="noopener noreferrer" class="link-card">
                                <div class="link-icon">
                                    <i class="${l.icon || 'fas fa-external-link-alt'}"></i>
                                </div>
                                <div class="link-content">
                                    <h3>${l.titulo}</h3>
                                    <p>${l.tipo === 'peca' ? 'Sugestão de Peças/Ferramentas' : 'Ofertas de Veículos'}</p>
                                </div>
                                <div class="link-btn">
                                    Acessar <i class="fas fa-chevron-right"></i>
                                </div>
                            </a>
                        `);
                    });

                    return `
                        <div class="topic-section">
                            <div class="topic-header">
                                <h2>${topic.topic}</h2>
                                <span class="topic-date">Consultado em ${date}</span>
                            </div>
                            <div class="media-grid">
                                ${mediaItems.join('')}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error(error);
                content.innerHTML = '<p style="text-align:center; color:var(--danger-red);">Falha ao carregar biblioteca. Tente novamente mais tarde.</p>';
            }
        }

        function getYouTubeVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
<script>if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{})})}</script>
</body>
</html>
