<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AutoAssist</title>
    <link rel="icon" type="image/png" href="static/logo2.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-card: #1c1c1f;
            --border-color: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-soft: rgba(59, 130, 246, 0.1);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .nav-logo-icon {
            width: auto;
            height: auto;
            background: transparent;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-icon i {
            font-size: 18px;
            color: white;
        }

        .nav-logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .nav-link:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        /* Dashboard Content */
        .dashboard-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .dashboard-header {
            margin-bottom: 40px;
        }

        .dashboard-header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .dashboard-header h1 span {
            background: linear-gradient(135deg, var(--accent), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Vehicle Card */
        .vehicle-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }

        .vehicle-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-soft);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .vehicle-icon i {
            font-size: 32px;
            color: var(--accent);
        }

        .vehicle-info h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .vehicle-meta {
            display: flex;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .vehicle-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 28px;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--accent);
        }

        .stat-card.fipe {
            border-left: 4px solid var(--accent);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-soft);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-card-icon i {
            font-size: 16px;
            color: var(--accent);
        }

        .stat-card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Alerts */
        .alert-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .alert-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .alert-item:first-child {
            padding-top: 0;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .alert-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .alert-badge {
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 100px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge-atencao {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .badge-aviso {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .badge-ok {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        /* Action Button */
        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 24px;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: white;
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        /* Divider */
        .section-divider {
            border: none;
            height: 1px;
            background: var(--border-color);
            margin: 48px 0;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
        }

        .loading i {
            font-size: 40px;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .loading p {
            color: var(--text-secondary);
        }

        /* No Vehicle */
        .no-vehicle {
            text-align: center;
            padding: 80px 20px;
        }

        .no-vehicle-icon {
            width: 100px;
            height: 100px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .no-vehicle-icon i {
            font-size: 40px;
            color: var(--text-muted);
        }

        .no-vehicle h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .no-vehicle p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 16px;
            }

            .nav-logo-text {
                display: none;
            }

            .nav-links {
                gap: 8px;
            }

            .nav-link span {
                display: none;
            }

            .nav-link {
                padding: 10px 12px;
            }

            .dashboard-content {
                padding: 24px 16px 60px;
            }

            .dashboard-header h1 {
                font-size: 26px;
            }

            .vehicle-card {
                flex-direction: column;
                text-align: center;
                padding: 24px;
            }

            .vehicle-meta {
                justify-content: center;
                flex-wrap: wrap;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 24px;
            }

            .stat-value {
                font-size: 28px;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vehicle-card,
        .stat-card {
            animation: fadeIn 0.5s ease-out;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">
                    <img src="logo.png" alt="AutoAssist IA" style="height:72px;width:auto;">
                </div>
                <span class="nav-logo-text">AutoAssist</span>
            </a>
            
            <div class="nav-links">
                <a href="chat.html" class="nav-link">
                    <i class="fas fa-comments"></i>
                    <span>Chat</span>
                </a>
                <a href="videos.html" id="premiumVideosLink" class="nav-link" style="display: none;">
                    <i class="fas fa-video"></i>
                    <span>Vídeos</span>
                </a>
                <a href="perfil.html" class="nav-link">
                    <i class="fas fa-user-circle"></i>
                    <span>Perfil</span>
                </a>
                <button onclick="Auth.logout()" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="dashboard-content" id="dashboardContent">
        <div id="loadingDash" class="loading">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Carregando dados do veículo...</p>
        </div>
    </div>

    <script src="static/js/config.js"></script>
    <script src="static/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof Auth === 'undefined' || !Auth.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            const currentUser = Auth.getUser();
            if (!currentUser?.is_premium) {
                window.location.href = 'chat.html';
                return;
            }
            document.getElementById('premiumVideosLink').style.display = 'flex';

            const content = document.getElementById('dashboardContent');

            try {
                const res = await Auth.authenticatedFetch('/api/dashboard');
                
                if (res.status === 404) {
                    content.innerHTML = `
                        <div class="no-vehicle">
                            <div class="no-vehicle-icon">
                                <i class="fas fa-car-crash"></i>
                            </div>
                            <h2>Nenhum veículo cadastrado</h2>
                            <p>Você ainda não cadastrou seu carro ou moto para receber análises personalizadas.</p>
                            <a href="perfil.html" class="btn-action" style="max-width: 280px; margin: 0 auto;">
                                <i class="fas fa-plus"></i>
                                Cadastrar Veículo
                            </a>
                        </div>
                    `;
                    return;
                }

                if (res.ok) {
                    const data = await res.json();
                    
                    const icons = {
                        'moto': 'fa-motorcycle',
                        'caminhao': 'fa-truck',
                        'aviao': 'fa-plane',
                        'navio': 'fa-ship',
                        'geral': 'fa-car'
                    };
                    
                    let htmlBuilder = `
                        <div class="dashboard-header">
                            <h1>Seu <span>Dashboard</span></h1>
                            <p>Acompanhe a saúde e o valor do seu patrimônio em tempo real.</p>
                        </div>
                    `;

                    data.forEach((item, index) => {
                        const iconClass = icons[item.veiculo.tipo] || 'fa-car';
                        htmlBuilder += `
                        <div class="vehicle-card">
                            <div class="vehicle-icon">
                                <i class="fas ${iconClass}"></i>
                            </div>
                            <div class="vehicle-info">
                                <h2>${item.veiculo.marca} ${item.veiculo.modelo}</h2>
                                <div class="vehicle-meta">
                                    <span><i class="fas fa-calendar"></i> Ano: ${item.veiculo.ano}</span>
                                    <span><i class="fas fa-tachometer-alt"></i> ${item.veiculo.quilometragem ? item.veiculo.quilometragem.toLocaleString() + ' km' : '---'}</span>
                                </div>
                            </div>
                        </div>

                        <div class="stats-grid">
                            <div class="stat-card fipe">
                                <div class="stat-card-header">
                                    <div class="stat-card-icon">
                                        <i class="fas fa-chart-line"></i>
                                    </div>
                                    <div class="stat-card-title">Valor de Mercado (FIPE)</div>
                                </div>
                                <div class="stat-value">${item.fipe.preco}</div>
                                <p class="stat-subtitle">Referência: ${item.fipe.mes}</p>
                            </div>

                            <div class="stat-card">
                                <div class="stat-card-header">
                                    <div class="stat-card-icon">
                                        <i class="fas fa-shield-alt"></i>
                                    </div>
                                    <div class="stat-card-title">Estado de Conservação</div>
                                </div>
                                <div id="alertsList">
                                    ${item.saude.map(alert => `
                                        <div class="alert-item">
                                            <div class="alert-content">
                                                <div class="alert-title">${alert.item}</div>
                                                <div class="alert-desc">${alert.msg}</div>
                                            </div>
                                            <span class="alert-badge badge-${alert.status.toLowerCase()}">${alert.status}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <a href="chat.html" class="btn-action">
                                    <i class="fas fa-comments"></i>
                                    Consultar sobre estes itens
                                </a>
                            </div>
                        </div>
                        ${index < data.length - 1 ? '<hr class="section-divider">' : ''}
                        `;
                    });
                    
                    content.innerHTML = htmlBuilder;
                } else {
                    throw new Error('Erro ao buscar dados');
                }
            } catch (e) {
                console.error(e);
                content.innerHTML = `
                    <div class="no-vehicle">
                        <div class="no-vehicle-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h2>Erro ao carregar</h2>
                        <p>Não foi possível carregar os dados do dashboard. Tente novamente mais tarde.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
