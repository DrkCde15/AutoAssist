<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoAssist - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #007aff;
            --bg-dark: #0f0f0f;
            --card-bg: #1c1c1e;
            --text: #ffffff;
            --text-dim: #a1a1a6;
            --success: #34c759;
            --warning: #ffcc00;
            --danger: #ff3b30;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            height: 96px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 0 2rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo img {
            height: 64px !important;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 0;
        }

        .nav-link:hover {
            color: var(--text);
            transform: translateY(-1px);
        }

        .nav-link.active {
            color: var(--accent);
        }

        /* Content Area */
        .dashboard-content {
            max-width: 1000px;
            margin: 100px auto 40px;
            padding: 0 2rem;
        }

        .dashboard-header {
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .dashboard-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .dashboard-header h1 span {
            color: var(--accent);
        }

        .dashboard-header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        /* Vehicle Card */
        .vehicle-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .vehicle-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 122, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--accent);
        }

        .vehicle-info h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.8rem;
        }

        .vehicle-meta {
            display: flex;
            gap: 1.5rem;
            color: var(--text-dim);
        }

        .vehicle-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .stat-card-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .stat-card-title {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* State of Health Section */
        .alert-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .alert-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .alert-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .alert-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-crítico { background: rgba(255, 59, 48, 0.15); color: var(--danger); }
        .badge-atenção { background: rgba(255, 204, 0, 0.15); color: var(--warning); }
        .badge-ok { background: rgba(52, 199, 89, 0.15); color: var(--success); }

        .btn-action {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1.5rem;
            width: 100%;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: var(--text-dim);
        }

        .loading i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .no-vehicle {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            border-radius: 32px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .no-vehicle-icon {
            font-size: 4rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
        }

        .section-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 4rem 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .nav-container { padding: 0 1rem; }
            .nav-links span { display: none; }
            .vehicle-card { flex-direction: column; text-align: center; gap: 1rem; }
            .vehicle-meta { justify-content: center; flex-wrap: wrap; }
            .dashboard-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="AutoAssist">
                AutoAssist
            </a>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="maintenance_history.html" class="nav-link">
                    <i class="fas fa-history"></i>
                    <span>Histórico</span>
                </a>
                <a href="chat.html" class="nav-link">
                    <i class="fas fa-comments"></i>
                    <span>Chat IA</span>
                </a>
                <a href="videos.html" id="premiumVideosLink" class="nav-link" style="display: none;">
                    <i class="fas fa-video"></i>
                    <span>Vídeos</span>
                </a>
                <a href="perfil.html" class="nav-link">
                    <i class="fas fa-user-circle"></i>
                    <span>Perfil</span>
                </a>
                <button onclick="Auth.logout()" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="dashboard-content" id="dashboardContent">
        <div id="loadingDash" class="loading">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Carregando dados do veículo...</p>
        </div>
    </div>

    <script src="static/js/config.js"></script>
    <script src="static/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof Auth === 'undefined' || !Auth.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            const currentUser = Auth.getUser();
            if (!currentUser?.is_premium) {
                window.location.href = 'chat.html';
                return;
            }
            document.getElementById('premiumVideosLink').style.display = 'flex';

            const content = document.getElementById('dashboardContent');
            
            // Exibição instantânea via Cache
            const cachedDash = Auth.Cache.get('autoassist_dashboard_cache');
            if (cachedDash) renderDashboard(cachedDash);

            try {
                const res = await Auth.authenticatedFetch('/api/dashboard');
                if (res.status === 404) {
                    content.innerHTML = `<div class="no-vehicle"><div class="no-vehicle-icon"><i class="fas fa-car-crash"></i></div><h2>Nenhum veículo cadastrado</h2><p>Vá ao perfil para cadastrar seu veículo.</p></div>`;
                    return;
                }

                if (res.ok) {
                    const data = await res.json();
                    Auth.Cache.set('autoassist_dashboard_cache', data);
                    renderDashboard(data);
                }
            } catch (error) {
                console.warn('Erro ao atualizar dashboard:', error);
                if (!cachedDash) {
                    content.innerHTML = '<div class="no-vehicle"><h2>Erro de conexão</h2><p>Tente novamente mais tarde.</p></div>';
                }
            }
        });

        function renderDashboard(data) {
            const content = document.getElementById('dashboardContent');
            const icons = {'moto': 'fa-motorcycle', 'caminhao': 'fa-truck', 'aviao': 'fa-plane', 'navio': 'fa-ship', 'geral': 'fa-car'};
            let htmlBuilder = `<div class="dashboard-header"><h1>Seu <span>Dashboard</span></h1><p>Acompanhe a saúde e o valor do seu patrimônio em tempo real.</p></div>`;

            data.forEach((item, index) => {
                const iconClass = icons[item.veiculo.tipo] || 'fa-car';
                htmlBuilder += `
                <div class="vehicle-card">
                    <div class="vehicle-icon"><i class="fas ${iconClass}"></i></div>
                    <div class="vehicle-info">
                        <h2>${item.veiculo.marca} ${item.veiculo.modelo}</h2>
                        <div class="vehicle-meta">
                            <span><i class="fas fa-calendar"></i> Ano: ${item.veiculo.ano_fabricacao || item.veiculo.ano || '---'}</span>
                            <span><i class="fas fa-tachometer-alt"></i> ${item.veiculo.quilometragem ? item.veiculo.quilometragem.toLocaleString() + ' km' : '---'}</span>
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card fipe">
                        <div class="stat-card-header">
                            <div class="stat-card-icon"><i class="fas fa-chart-line"></i></div>
                            <div class="stat-card-title">Valor de Mercado (FIPE)</div>
                        </div>
                        <div class="stat-value">${item.fipe ? (item.fipe.Valor || item.fipe.preco || '---') : '---'}</div>
                        <p class="stat-subtitle">Referência: ${item.fipe ? (item.fipe.MesReferencia || item.fipe.mes || '---') : '---'}</p>
                    </div>

                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div class="stat-card-icon"><i class="fas fa-shield-alt"></i></div>
                            <div class="stat-card-title">Estado de Conservação</div>
                        </div>
                        <div id="alertsList">
                            ${item.saude.map(alert => `
                                <div class="alert-item">
                                    <div class="alert-content">
                                        <div class="alert-title">${alert.item}</div>
                                        <div class="alert-desc">${alert.msg}</div>
                                    </div>
                                    <span class="alert-badge badge-${alert.status.toLowerCase()}">${alert.status}</span>
                                </div>
                            `).join('')}
                        </div>
                        <a href="chat.html" class="btn-action"><i class="fas fa-comments"></i> Consultar sobre estes itens</a>
                    </div>
                </div>
                ${index < data.length - 1 ? '<hr class="section-divider">' : ''}
                `;
            });
            content.innerHTML = htmlBuilder;
        }
    </script>
</body>
</html>
