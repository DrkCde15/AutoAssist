<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historico de Manutencao - AutoAssist</title>
    <link rel="icon" type="image/png" href="static/logo2.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-card: #1c1c1f;
            --bg-input: #27272a;
            --border-color: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 20px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .nav-link:hover {
            color: var(--text-primary);
            border-color: #3f3f46;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 18px;
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        textarea,
        input,
        select {
            width: 100%;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 11px 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        textarea:focus,
        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .field-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 14px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: #fff;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            border-color: #3f3f46;
        }

        .email-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .switch {
            position: relative;
            width: 48px;
            height: 26px;
            display: inline-block;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #3f3f46;
            border-radius: 999px;
            transition: var(--transition);
            cursor: pointer;
        }

        .slider:before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 3px;
            top: 3px;
            border-radius: 50%;
            background: white;
            transition: var(--transition);
        }

        .switch input:checked + .slider {
            background: var(--accent);
        }

        .switch input:checked + .slider:before {
            transform: translateX(22px);
        }

        .muted {
            color: var(--text-muted);
            font-size: 13px;
        }

        .alerts-list,
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert-item,
        .history-item {
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 12px;
        }

        .item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        .item-title {
            font-weight: 600;
            font-size: 14px;
        }

        .badge {
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 8px;
            letter-spacing: 0.4px;
        }

        .badge-overdue,
        .badge-atencao {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .badge-due_soon,
        .badge-aviso {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .badge-on_track,
        .badge-ok {
            background: rgba(34, 197, 94, 0.18);
            color: #4ade80;
        }

        .item-text {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.45;
        }

        .item-meta {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-card .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
        }

        .small-select {
            width: 230px;
        }

        .empty {
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 960px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .layout-grid {
                grid-template-columns: 1fr;
            }

            .field-row-3 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 680px) {
            .container {
                padding: 22px 14px 48px;
            }

            .page-title {
                font-size: 24px;
            }

            .field-row {
                grid-template-columns: 1fr;
            }

            .history-card .card-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .small-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">
            <img src="logo.png" alt="AutoAssist IA" style="height:56px;width:auto;">
            <span>AutoAssist</span>
        </a>
        <div class="nav-links">
            <a href="chat.html" class="nav-link"><i class="fas fa-comments"></i> Chat</a>
            <a href="perfil.html" class="nav-link"><i class="fas fa-user"></i> Perfil</a>
            <button class="nav-link" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </div>
</nav>

<main class="container">
    <header class="page-header">
        <h1 class="page-title">Historico de Manutencao</h1>
        <p class="page-subtitle">Registre servicos em texto livre, acompanhe gastos e veja retornos automaticos.</p>
    </header>

    <section class="stats-grid">
        <article class="stat-card">
            <div class="stat-title">Total gasto</div>
            <div class="stat-value" id="statTotal">R$ 0,00</div>
        </article>
        <article class="stat-card">
            <div class="stat-title">Registros</div>
            <div class="stat-value" id="statCount">0</div>
        </article>
        <article class="stat-card">
            <div class="stat-title">Alertas atrasados</div>
            <div class="stat-value" id="statOverdue">0</div>
        </article>
    </section>

    <section class="layout-grid">
        <article class="card">
            <h2 class="card-title"><i class="fas fa-pen-to-square"></i> Novo registro</h2>
            <div class="field">
                <label for="descricao">Descricao da manutencao</label>
                <textarea id="descricao" placeholder="Ex: Troquei o oleo hoje, gastei R$ 280 e estava com 45.000 km"></textarea>
            </div>
            <div class="field">
                <label for="veiculoSelect">Veiculo (opcional)</label>
                <select id="veiculoSelect"></select>
            </div>
            <div class="field-row">
                <div class="field">
                    <label for="custo">Custo (opcional)</label>
                    <input id="custo" type="text" placeholder="Ex: 280,90">
                </div>
                <div class="field">
                    <label for="kmServico">KM do servico (opcional)</label>
                    <input id="kmServico" type="number" placeholder="Ex: 45000">
                </div>
            </div>
            <div class="field-row-3">
                <div class="field">
                    <label for="dataServico">Data (opcional)</label>
                    <input id="dataServico" type="date">
                </div>
                <div class="field">
                    <label for="intervaloDias">Intervalo dias (opcional)</label>
                    <input id="intervaloDias" type="number" placeholder="Ex: 180">
                </div>
                <div class="field">
                    <label for="intervaloKm">Intervalo km (opcional)</label>
                    <input id="intervaloKm" type="number" placeholder="Ex: 10000">
                </div>
            </div>
            <button class="btn btn-primary" id="btnSalvarRegistro">
                <i class="fas fa-plus"></i>
                Salvar no historico
            </button>
        </article>

        <article class="card">
            <h2 class="card-title"><i class="fas fa-bell"></i> Alertas inteligentes</h2>
            <div class="email-row">
                <div>
                    <div style="font-weight:600;font-size:14px;">Email automatico diario</div>
                    <div class="muted" id="emailLastSent">Ultimo envio: -</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="emailToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="alerts-list" id="alertsList"></div>
        </article>
    </section>

    <section class="card history-card">
        <div class="card-head">
            <h2 class="card-title" style="margin:0;"><i class="fas fa-clock-rotate-left"></i> Registros salvos</h2>
            <select id="vehicleFilter" class="small-select"></select>
        </div>
        <div class="history-list" id="historyList"></div>
    </section>
</main>

<script src="static/js/config.js"></script>
<script src="static/js/auth.js"></script>
<script>
    const state = {
        user: null,
        vehicles: [],
        history: [],
        resumo: null,
        alerts: [],
        emailSettings: null
    };

    function escapeHtml(text) {
        if (text === null || text === undefined) return "";
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function formatCurrency(value) {
        const number = Number(value || 0);
        return number.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function formatDate(value) {
        if (!value) return "-";
        const dt = new Date(value);
        if (Number.isNaN(dt.getTime())) return value;
        return dt.toLocaleDateString("pt-BR");
    }

    function getVehicleMap() {
        const map = new Map();
        state.vehicles.forEach((v) => {
            const label = [v.marca, v.modelo].filter(Boolean).join(" ").trim() || ("Veiculo #" + v.id);
            map.set(Number(v.id), label);
        });
        return map;
    }

    function getBadgeClass(statusCode, statusLabel) {
        const normalized = (statusCode || statusLabel || "").toString().toLowerCase();
        if (normalized.includes("overdue") || normalized.includes("atencao") || normalized.includes("aten")) return "badge badge-overdue";
        if (normalized.includes("due_soon") || normalized.includes("aviso")) return "badge badge-due_soon";
        return "badge badge-on_track";
    }

    function selectedVehicleQuery() {
        const raw = document.getElementById("vehicleFilter").value;
        if (!raw) return "";
        return "?veiculo_id=" + encodeURIComponent(raw);
    }

    async function fetchUser() {
        const res = await Auth.authenticatedFetch("/api/user");
        if (!res.ok) throw new Error("Falha ao carregar usuario");
        state.user = await res.json();
        state.vehicles = Array.isArray(state.user.veiculos) ? state.user.veiculos : [];
    }

    async function fetchHistory() {
        const res = await Auth.authenticatedFetch("/api/maintenance/history" + selectedVehicleQuery());
        if (!res.ok) throw new Error("Falha ao carregar historico");
        const data = await res.json();
        state.history = Array.isArray(data.historico) ? data.historico : [];
        state.resumo = data.resumo || { total_gastos: 0, quantidade_registros: 0 };
    }

    async function fetchAlerts() {
        const res = await Auth.authenticatedFetch("/api/maintenance/alerts" + selectedVehicleQuery());
        if (!res.ok) throw new Error("Falha ao carregar alertas");
        const data = await res.json();
        state.alerts = Array.isArray(data.alertas) ? data.alertas : [];
    }

    async function fetchEmailSettings() {
        const res = await Auth.authenticatedFetch("/api/maintenance/email-settings");
        if (!res.ok) {
            state.emailSettings = { maintenance_email_enabled: true, maintenance_email_last_sent: null };
            return;
        }
        state.emailSettings = await res.json();
    }

    function renderVehicleSelects() {
        const options = ['<option value="">Sem vinculo de veiculo</option>']
            .concat(state.vehicles.map((v) => {
                const label = escapeHtml(([v.marca, v.modelo].filter(Boolean).join(" ") || ("Veiculo #" + v.id)));
                return `<option value="${v.id}">${label}</option>`;
            }))
            .join("");

        document.getElementById("veiculoSelect").innerHTML = options;

        const filterOptions = ['<option value="">Todos os veiculos</option>']
            .concat(state.vehicles.map((v) => {
                const label = escapeHtml(([v.marca, v.modelo].filter(Boolean).join(" ") || ("Veiculo #" + v.id)));
                return `<option value="${v.id}">${label}</option>`;
            }))
            .join("");
        document.getElementById("vehicleFilter").innerHTML = filterOptions;
    }

    function renderStats() {
        const total = Number(state.resumo?.total_gastos || 0);
        const count = Number(state.resumo?.quantidade_registros || state.history.length || 0);
        const overdue = state.alerts.filter((a) => String(a.status_code || "").toLowerCase() === "overdue").length;

        document.getElementById("statTotal").textContent = formatCurrency(total);
        document.getElementById("statCount").textContent = String(count);
        document.getElementById("statOverdue").textContent = String(overdue);
    }

    function renderAlerts() {
        const container = document.getElementById("alertsList");
        if (!state.alerts.length) {
            container.innerHTML = '<div class="empty">Nenhum alerta ativo no momento.</div>';
            return;
        }

        container.innerHTML = state.alerts.slice(0, 8).map((alert) => {
            const badgeClass = getBadgeClass(alert.status_code, alert.status);
            return `
                <div class="alert-item">
                    <div class="item-top">
                        <div class="item-title">${escapeHtml(alert.item || "Manutencao")}</div>
                        <span class="${badgeClass}">${escapeHtml(alert.status || "Aviso")}</span>
                    </div>
                    <div class="item-text">${escapeHtml(alert.msg || "")}</div>
                </div>
            `;
        }).join("");
    }

    function renderHistory() {
        const container = document.getElementById("historyList");
        if (!state.history.length) {
            container.innerHTML = '<div class="empty">Nenhum registro ainda. Adicione sua primeira manutencao acima.</div>';
            return;
        }

        const vehicleMap = getVehicleMap();
        container.innerHTML = state.history.map((item) => {
            const vehicleId = item.vehicle_id !== null && item.vehicle_id !== undefined ? Number(item.vehicle_id) : null;
            const vehicleLabel = vehicleId !== null ? (vehicleMap.get(vehicleId) || ("Veiculo #" + vehicleId)) : "Sem vinculo";
            const nextDate = item.next_due_date ? formatDate(item.next_due_date) : "-";
            const nextKm = item.next_due_km ? (Number(item.next_due_km).toLocaleString("pt-BR") + " km") : "-";
            const costLabel = item.cost !== null && item.cost !== undefined ? formatCurrency(item.cost) : "-";

            return `
                <div class="history-item">
                    <div class="item-top">
                        <div class="item-title">${escapeHtml(item.maintenance_label || "Manutencao geral")}</div>
                        <span class="badge badge-on_track">${formatDate(item.service_date)}</span>
                    </div>
                    <div class="item-text">${escapeHtml(item.description || "")}</div>
                    <div class="item-meta">
                        <span><i class="fas fa-car"></i> ${escapeHtml(vehicleLabel)}</span>
                        <span><i class="fas fa-money-bill-wave"></i> ${escapeHtml(costLabel)}</span>
                        <span><i class="fas fa-calendar-check"></i> Proxima data: ${escapeHtml(nextDate)}</span>
                        <span><i class="fas fa-gauge-high"></i> Proximo km: ${escapeHtml(nextKm)}</span>
                    </div>
                </div>
            `;
        }).join("");
    }

    function renderEmailSettings() {
        const settings = state.emailSettings || {};
        const enabled = !!settings.maintenance_email_enabled;
        const lastSent = settings.maintenance_email_last_sent ? formatDate(settings.maintenance_email_last_sent) : "-";
        document.getElementById("emailToggle").checked = enabled;
        document.getElementById("emailLastSent").textContent = "Ultimo envio: " + lastSent;
    }

    async function saveEmailToggle(enabled) {
        const res = await Auth.authenticatedFetch("/api/maintenance/email-settings", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enabled })
        });
        if (!res.ok) throw new Error("Nao foi possivel atualizar email automatico");
    }

    async function submitMaintenance() {
        const description = document.getElementById("descricao").value.trim();
        if (!description) {
            alert("Descreva a manutencao antes de salvar.");
            return;
        }

        const payload = { descricao: description };
        const vehicleId = document.getElementById("veiculoSelect").value;
        const custo = document.getElementById("custo").value.trim();
        const kmServico = document.getElementById("kmServico").value.trim();
        const dataServico = document.getElementById("dataServico").value;
        const intervaloDias = document.getElementById("intervaloDias").value.trim();
        const intervaloKm = document.getElementById("intervaloKm").value.trim();

        if (vehicleId) payload.veiculo_id = Number(vehicleId);
        if (custo) payload.custo = custo;
        if (kmServico) payload.quilometragem_servico = Number(kmServico);
        if (dataServico) payload.data_servico = dataServico;
        if (intervaloDias) payload.intervalo_dias = Number(intervaloDias);
        if (intervaloKm) payload.intervalo_km = Number(intervaloKm);

        const btn = document.getElementById("btnSalvarRegistro");
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Salvando...';

        try {
            const res = await Auth.authenticatedFetch("/api/maintenance/history", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Erro ao salvar manutencao");

            document.getElementById("descricao").value = "";
            document.getElementById("custo").value = "";
            document.getElementById("kmServico").value = "";
            document.getElementById("dataServico").value = "";
            document.getElementById("intervaloDias").value = "";
            document.getElementById("intervaloKm").value = "";

            await Promise.all([fetchHistory(), fetchAlerts(), fetchEmailSettings()]);
            renderStats();
            renderAlerts();
            renderHistory();
            renderEmailSettings();
        } catch (err) {
            alert(err.message || "Erro ao salvar manutencao.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = original;
        }
    }

    async function sendEmailNow() {
        const btn = document.getElementById("btnSendNow");
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Enviando...';
        try {
            const res = await Auth.authenticatedFetch("/api/maintenance/email/send-now", {
                method: "POST"
            });
            const data = await res.json();
            if (!res.ok && res.status !== 202) throw new Error(data.error || "Falha no envio");
            if (data.success) {
                alert("Email enviado com sucesso.");
            } else {
                alert("Sem envio agora: " + (data.reason || "sem alertas"));
            }
            await fetchEmailSettings();
            renderEmailSettings();
        } catch (err) {
            alert(err.message || "Erro ao enviar email.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = original;
        }
    }

    async function refreshData() {
        await Promise.all([fetchHistory(), fetchAlerts(), fetchEmailSettings()]);
        renderStats();
        renderAlerts();
        renderHistory();
        renderEmailSettings();
    }

    async function init() {
        if (typeof Auth === "undefined" || !Auth.isAuthenticated()) {
            window.location.href = "login.html";
            return;
        }

        try {
            await fetchUser();
            renderVehicleSelects();
            await refreshData();
        } catch (err) {
            console.error(err);
            alert("Nao foi possivel carregar o historico de manutencao.");
        }
    }

    document.getElementById("btnSalvarRegistro").addEventListener("click", submitMaintenance);
    document.getElementById("vehicleFilter").addEventListener("change", refreshData);
    document.getElementById("btnSendNow").addEventListener("click", sendEmailNow);
    document.getElementById("btnLogout").addEventListener("click", () => Auth.logout());
    document.getElementById("emailToggle").addEventListener("change", async (event) => {
        const checked = event.target.checked;
        try {
            await saveEmailToggle(checked);
        } catch (err) {
            event.target.checked = !checked;
            alert(err.message || "Erro ao atualizar configuracao de email.");
        }
    });

    init();
</script>
</body>
</html>
