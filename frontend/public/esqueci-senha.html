<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>AutoAssist • Recuperar Senha</title>
    <link rel="icon" type="image/png" href="static/logo2.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

    <style>
      :root {
        --bg-primary: #09090b;
        --bg-secondary: #18181b;
        --bg-card: #1c1c1f;
        --border-color: #27272a;
        --border-focus: #3b82f6;
        --text-primary: #fafafa;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --accent-soft: rgba(59, 130, 246, 0.1);
        --danger: #ef4444;
        --success: #22c55e;
        --radius: 12px;
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
        --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: 
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.15), transparent),
          radial-gradient(ellipse 60% 40% at 100% 100%, rgba(59, 130, 246, 0.08), transparent);
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 40px;
        box-shadow: var(--shadow-lg);
      }

      /* Logo */
      .logo {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: auto;
        height: auto;
        background: transparent;
        border-radius: 0;
        margin-bottom: 16px;
        box-shadow: none;
      }

      .logo-mark i {
        font-size: 24px;
        color: white;
      }

      .logo h1 {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text-primary);
      }

      .logo p {
        color: var(--text-secondary);
        font-size: 14px;
        margin-top: 6px;
      }

      /* Alerts */
      .alert {
        display: none;
        padding: 14px 16px;
        border-radius: var(--radius);
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid;
      }

      .alert-error {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
      }

      .alert-success {
        background: rgba(34, 197, 94, 0.1);
        border-color: rgba(34, 197, 94, 0.2);
        color: #86efac;
      }

      /* Form */
      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 14px 16px 14px 44px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        color: var(--text-primary);
        font-size: 14px;
        font-family: inherit;
        transition: var(--transition);
        outline: none;
      }

      input::placeholder {
        color: var(--text-muted);
      }

      input:focus {
        border-color: var(--border-focus);
        background: var(--bg-primary);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      /* Button */
      .btn {
        width: 100%;
        padding: 14px 20px;
        border: none;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #1d4ed8);
        color: white;
        box-shadow: 0 2px 12px rgba(59, 130, 246, 0.3);
      }

      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, var(--accent-hover), #1e40af);
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* Links */
      .links {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .links a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
      }

      .links a:hover {
        color: var(--accent-hover);
        text-decoration: underline;
      }

      /* Responsive */
      @media (max-width: 480px) {
        body {
          padding: 16px;
        }

        .container {
          padding: 28px 20px;
        }

        .logo h1 {
          font-size: 22px;
        }

        input {
          padding: 12px 12px 12px 40px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <div class="logo-mark">
          <img src="logo.png" alt="AutoAssist IA" style="height:72px;width:auto;">
        </div>
        <h1>AutoAssist</h1>
        <p>Recuperar acesso à sua conta</p>
      </div>

      <div id="alertError" class="alert alert-error"></div>
      <div id="alertSuccess" class="alert alert-success"></div>

      <div class="form-group">
        <label>E-mail da Conta</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
        </div>
      </div>

      <button class="btn btn-primary" id="btnEnviar">
        Enviar Link de Recuperação
        <i class="fas fa-paper-plane"></i>
      </button>

      <div class="links">
        Lembrou sua senha? <a href="login.html">Voltar para Login</a>
      </div>
    </div>

    <script src="./static/js/config.js"></script>
    <script src="./static/js/auth.js"></script>

    <script>
      const btn = document.getElementById("btnEnviar");
      const alertError = document.getElementById("alertError");
      const alertSuccess = document.getElementById("alertSuccess");

      function showError(msg) {
        alertError.textContent = msg;
        alertError.style.display = "block";
        alertSuccess.style.display = "none";
      }

      function showSuccess(msg) {
        alertSuccess.textContent = msg;
        alertSuccess.style.display = "block";
        alertError.style.display = "none";
      }

      btn.addEventListener("click", async () => {
        alertError.style.display = "none";
        alertSuccess.style.display = "none";

        const email = document.getElementById("email").value.trim();

        if (!email) {
          showError("Digite o e-mail da sua conta.");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Enviando...';

        try {
          if (typeof Auth !== 'undefined' && Auth.forgotPassword) {
            await Auth.forgotPassword(email);
          }

          showSuccess("Se este e-mail existir no sistema, um link de recuperação será enviado.");

        } catch (err) {
          showError(err.message || "Erro ao solicitar recuperação.");
        }

        btn.disabled = false;
        btn.innerHTML = 'Enviar Link de Recuperação <i class="fas fa-paper-plane"></i>';
      });
    </script>
  </body>
</html>
