name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lint with flake8 (syntax/import check)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run backend security tests
        env:
          JWT_SECRET_KEY: ci_test_secret
          MAINTENANCE_EMAIL_CRON_SECRET: ci_cron_secret
          CAKTO_WEBHOOK_SECRET: ci_webhook_secret
          FLASK_ENV: testing
        run: |
          python -m pytest ../tests/test_cron_and_webhook.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Unit tests (security-utils)
        run: npm run test:unit

      - name: Lint JS
        run: npm run lint

      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Start backend for integration tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          python -c "import os; print('backend deps ok')"
        continue-on-error: true

      - name: Playwright tests
        run: npx playwright test --reporter=line
        continue-on-error: true
