name: Send Pending Reset Emails

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  send-reset-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Process queue and send via SMTP
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          EMAIL_PROVIDER: smtp
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA_APP: ${{ secrets.EMAIL_SENHA_APP }}
          FLASK_ENV: production
          RESET_EMAIL_BATCH_SIZE: 50
          RESET_EMAIL_RETRY_SECONDS: 15
        run: python backend/utils/process_reset_email_queue_once.py
