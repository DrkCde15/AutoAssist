name: Dispatch Critical Maintenance Emails

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum users to scan"
        required: false
        default: "500"
      include_due_soon:
        description: "Also send due_soon warnings"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force:
        description: "Ignore daily user email throttle"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "*/30 * * * *"

jobs:
  dispatch-critical-maintenance-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Dispatch critical maintenance emails
        env:
          AUTOASSIST_APP_URL: ${{ secrets.AUTOASSIST_APP_URL }}
          MAINTENANCE_EMAIL_CRON_SECRET: ${{ secrets.MAINTENANCE_EMAIL_CRON_SECRET }}
          LIMIT: ${{ github.event.inputs.limit || '500' }}
          INCLUDE_DUE_SOON: ${{ github.event.inputs.include_due_soon || 'false' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail

          if [ -z "${AUTOASSIST_APP_URL}" ]; then
            echo "AUTOASSIST_APP_URL secret is missing."
            exit 1
          fi

          if [ -z "${MAINTENANCE_EMAIL_CRON_SECRET}" ]; then
            echo "MAINTENANCE_EMAIL_CRON_SECRET secret is missing."
            exit 1
          fi

          APP_URL="${AUTOASSIST_APP_URL%/}"
          PAYLOAD=$(printf '{"limit":%s,"transition_only":true,"include_due_soon":%s,"force":%s}' \
            "${LIMIT}" \
            "${INCLUDE_DUE_SOON}" \
            "${FORCE}")

          curl --fail --show-error --location \
            --retry 5 \
            --retry-delay 20 \
            --retry-all-errors \
            --max-time 180 \
            -X POST "${APP_URL}/api/maintenance/email/dispatch" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: ${MAINTENANCE_EMAIL_CRON_SECRET}" \
            -d "${PAYLOAD}"
