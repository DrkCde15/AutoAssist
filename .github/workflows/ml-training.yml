name: ML Model Training

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSL_VERIFY: "false"
      MIN_RECORDS_FOR_PREDICTION: "5"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          python -m spacy download pt_core_news_sm || true

      - name: Run model training
        run: python backend/scripts/train.py

      - name: Upload models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictive-models
          path: |
            backend/models/predictive/model_km.pkl
            backend/models/predictive/model_date.pkl
            backend/models/predictive/model_anomaly.pkl
            backend/models/predictive/label_encoder.pkl
            backend/models/predictive/scaler.pkl
            backend/models/predictive/params.json
            backend/models/predictive/classes.npy
            backend/models/predictive/scaler_mean.npy
            backend/models/predictive/scaler_std.npy
          retention-days: 90
          if-no-files-found: warn
