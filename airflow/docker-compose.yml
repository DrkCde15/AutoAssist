x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: 'America/Sao_Paulo'
    # Credenciais do MySQL do AutoAssist (mesmas do backend/.env)
    DB_HOST: ${DB_HOST:-host.docker.internal}
    DB_PORT: ${DB_PORT:-3306}
    DB_NAME: ${DB_NAME:-autoassist}
    DB_USER: ${DB_USER:-root}
    DB_PASSWORD: ${DB_PASSWORD:-}
    # Pasta onde os modelos sao lidos/escritos (gravavel pelo airflow)
    PREDICTIVE_MODEL_DIR: /opt/airflow/models_predictive
  volumes:
    - ./dags:/opt/airflow/dags
    - ../backend:/opt/airflow/backend
    - predictive-models:/opt/airflow/models_predictive
    - airflow-logs:/opt/airflow/logs
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/backend/models/predictive
        mkdir -p /opt/airflow/models_predictive
        chown -R airflow:root /opt/airflow/models_predictive
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Auto \
          --lastname Assist \
          --role Admin \
          --email admin@autoassist.app
    depends_on:
      postgres:
        condition: service_healthy

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

  scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

volumes:
  postgres-db-volume:
  airflow-logs:
  predictive-models:
